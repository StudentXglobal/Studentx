<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>StudentX - Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Poppins,sans-serif;background:#0a0a0f;min-height:100vh;position:relative;overflow-x:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=800&q=80') center/cover;opacity:.12;filter:blur(30px)}
.bg2{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(10,10,15,.9) 0%,rgba(10,10,15,.95) 100%)}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.top{text-align:center;margin-bottom:28px}
.top .logo{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px}
.top .logo b{font-weight:900;background:linear-gradient(135deg,#7c3aed,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top .sub{margin-top:6px;font-size:10px;font-weight:500;letter-spacing:3px}
.top .sub .a{color:#7c3aed}.top .sub .b{color:#a855f7}.top .sub .c{color:#06b6d4}
.top h2{color:#fff;font-size:16px;font-weight:700;margin-top:14px}
.top p{color:rgba(255,255,255,.45);font-size:12px;margin-top:6px;line-height:1.5;max-width:280px}
.card{width:100%;max-width:360px;background:rgba(20,20,40,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px 20px}
.tabs{display:flex;background:rgba(255,255,255,.05);border-radius:12px;padding:3px;margin-bottom:22px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;border-radius:10px;color:rgba(255,255,255,.4);cursor:pointer;transition:all .25s}
.tab.on{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.social{display:flex;gap:10px;margin-bottom:20px}
.social button{flex:1;padding:11px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.6);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;cursor:pointer}
.social button:hover{border-color:rgba(124,58,237,.4);color:#fff}
.social button i{font-size:16px}
.or{display:flex;align-items:center;gap:12px;margin-bottom:18px;color:rgba(255,255,255,.25);font-size:11px}
.or::before,.or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);margin-bottom:6px}
.fg input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:14px;transition:border-color .2s}
.fg input:focus{border-color:#7c3aed}
.fg input::placeholder{color:rgba(255,255,255,.2)}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.row label{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer}
.row label input{width:14px;height:14px;accent-color:#7c3aed}
.row a{font-size:12px;color:#a855f7;font-weight:600}
.btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.btn:hover{transform:scale(1.02)}
.btn:active{transform:scale(.98)}
.foot{text-align:center;margin-top:18px;font-size:12px;color:rgba(255,255,255,.35)}
.foot span{color:#a855f7;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg2"></div>
<div class="wrap">
<div class="top">
<div class="logo">Student<b>X</b></div>
<div class="sub"><span class="a">Connect</span> · <span class="b">Learn</span> · <span class="c">Share</span></div>
<h2>The Future of Student Networking</h2>
<p>Join millions of students worldwide. Share knowledge, connect with peers, and grow together.</p>
</div>
<div class="card">
<div class="tabs">
<div class="tab on" id="tabLogin" onclick="switchTab('login')">Log In</div>
<div class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</div>
</div>
<div class="social">
<button onclick="googleLogin()"><i class="fab fa-google"></i> Google</button>
<button onclick="showMsg('Facebook login coming soon')"><i class="fab fa-facebook-f"></i> Facebook</button>
<button onclick="showMsg('Apple login coming soon')"><i class="fab fa-apple"></i> Apple</button>
</div>
<div class="or">OR</div>
<div class="fg">
<label>Email or Username</label>
<input type="text" id="emailInput" placeholder="Enter your email or username">
</div>
<div class="fg">
<label>Password</label>
<input type="password" id="passInput" placeholder="Enter your password">
</div>
<div class="row">
<label><input type="checkbox" checked> Remember me</label>
<a href="#" onclick="showMsg('Reset password link sent')">Forgot Password?</a>
</div>
<button class="btn" id="mainBtn" onclick="handleBtn()">Log In</button>
<div class="foot" id="footText">Don't have an account? <span onclick="goSignup()">Sign Up</span></div>
</div>
</div>
<script>
var mode = 'login';

function switchTab(m) {
  mode = m;
  document.getElementById('tabLogin').classList.toggle('on', m === 'login');
  document.getElementById('tabSignup').classList.toggle('on', m === 'signup');
  if (m === 'signup') {
    goSignup();
  }
}

function goSignup() {
  window.location.href = 'signup.html';
}

function googleLogin() {
  window.location.href = 'https://github.com/login/oauth/authorize?client_id=YOUR_CLIENT_ID&scope=user:email';
}

function handleBtn() {
  if (mode === 'signup') {
    goSignup();
    return;
  }
  var e = document.getElementById('emailInput').value.trim();
  var p = document.getElementById('passInput').value.trim();
  if (!e) {
    showMsg('Please enter your email or username');
    return;
  }
  if (!p) {
    showMsg('Please enter your password');
    return;
  }
  showMsg('Welcome back!');
  setTimeout(function() {
    window.location.href = 'home.html';
  }, 800);
}

function showMsg(t) {
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 20px;background:rgba(124,58,237,0.9);color:#fff;border-radius:12px;font-size:13px;font-weight:600;font-family:Poppins,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:fi .3s ease';
  d.textContent = t;
  document.body.appendChild(d);
  setTimeout(function() { d.remove(); }, 2500);
}

var st = document.createElement('style');
st.textContent = '@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
document.head.appendChild(st);
</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="login.js"></script>

  
</body>
</html>
