<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX - Welcome</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;1,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07091B;
            --bg-blue: #0D1442;
            --grad-blue: #1877F2;
            --grad-purple: #8A2BE2;
            --grad-pink: #FF00FF;
            --text-light: #E2E8F0;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Container (390x844 responsive) */
        .mobile-frame {
            width: 100%;
            max-width: 390px;
            height: 100vh;
            max-height: 844px;
            background: linear-gradient(160deg, var(--bg-dark) 0%, var(--bg-blue) 50%, #1A236C 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(24, 119, 242, 0.1);
        }

        @media (min-height: 850px) {
            .mobile-frame {
                height: 844px;
                border-radius: 40px;
                border: 8px solid #1a1a2e;
            }
        }

        /* Abstract Background Glows & Shapes */
        .bg-glow-1 {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(24, 119, 242, 0.4) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }

        .bg-glow-2 {
            position: absolute;
            top: 20%;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }

        .abstract-pattern {
            position: absolute;
            top: 15%;
            right: -20px;
            width: 150px;
            height: 150px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 15px 15px;
            border-radius: 50%;
            z-index: 0;
            mask-image: radial-gradient(circle, black 40%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 70%);
        }

        /* Content Top Section */
        .top-content {
            position: relative;
            z-index: 2;
            padding: 50px 24px 0;
            text-align: center;
        }

        /* Logo */
        .logo-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 38px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -1.5px;
        }

        .logo-x {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 800;
            font-style: italic;
            background: linear-gradient(135deg, var(--grad-blue), var(--grad-purple), var(--grad-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: -4px;
        }

        .tagline {
            margin-top: 8px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            letter-spacing: 3px;
        }

        .tagline span {
            color: var(--grad-purple);
            margin: 0 2px;
        }

        /* Typography */
        .hero-title {
            margin-top: 35px;
            font-size: 32px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-light);
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Students Image Section */
        .students-img-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1;
            margin-top: 10px;
        }

        .students-img {
            width: 110%;
            height: 280px;
            background-image: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            /* Gradient fade out at the bottom to blend with the white sheet */
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        /* White Bottom Sheet */
        .bottom-sheet {
            background-color: var(--white);
            border-radius: 35px 35px 0 0;
            padding: 35px 24px 40px;
            position: relative;
            z-index: 3;
            box-shadow: 0 -15px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Buttons Style */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: transform 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Primary Button */
        .btn-primary {
            background: linear-gradient(90deg, #2E38A3, #4552E6);
            color: var(--white);
            box-shadow: 0 10px 25px rgba(69, 82, 230, 0.35);
        }

        /* Secondary Button */
        .btn-secondary {
            background-color: #F4F6F9;
            color: #1A1A2E;
            border: 1.5px solid #E2E8F0;
        }

        /* Third Button (Guest Mode) */
        .btn-guest {
            background-color: transparent;
            color: #64748B;
            font-weight: 500;
            padding: 10px;
        }

    </style>
</head>
<body>

    <div class="mobile-frame">
        
        <!-- Background Effects -->
        <div class="bg-glow-1"></div>
        <div class="bg-glow-2"></div>
        <div class="abstract-pattern"></div>

        <!-- Top Content -->
        <div class="top-content">
            <div class="logo-wrapper">
                <span class="logo-text">Student</span>
                <span class="logo-x">X</span>
            </div>
            
            <div class="tagline">
                CONNECT <span>•</span> LEARN <span>•</span> SHARE <span>•</span> GROW
            </div>

            <div class="hero-title">
                Welcome to<br>StudentX
            </div>

            <div class="subtitle">
                Connect with students, learn together and build your future.
            </div>
        </div>

        <!-- Students Image -->
        <div class="students-img-container">
            <div class="students-img"></div>
        </div>

        <!-- Action Bottom Sheet -->
        <div class="bottom-sheet">
            <!-- Navigation strictly as requested using JavaScript -->
            <button class="btn btn-primary" onclick="window.location.href='login.html'">
                Log In
            </button>
            
            <button class="btn btn-secondary" onclick="window.location.href='signup.html'">
                Sign Up
            </button>
            
            <button class="btn btn-guest" onclick="window.location.href='home.html'">
                Continue in Guest Mode
            </button>
        </div>

    </div>

</body>
</html>
