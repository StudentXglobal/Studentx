<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>StudentX - StudyHub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Poppins,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;padding-bottom:70px}
.hdr{position:sticky;top:0;z-index:100;padding:10px 14px;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:20px;font-weight:800}
.hdr-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:15px;transition:all .15s}
.hdr-btn:hover{background:rgba(124,58,237,.1);color:#a855f7}

.banner{margin:14px;padding:24px 20px;border-radius:18px;background:linear-gradient(135deg,#7c3aed,#6d28d9,#4f46e5);position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.banner:hover{transform:scale(1.01)}
.banner::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.banner::after{content:'';position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.banner h2{font-size:20px;font-weight:800;margin-bottom:4px;position:relative}
.banner p{font-size:13px;opacity:.8;position:relative;line-height:1.4}
.banner-btn{display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:9px 20px;border-radius:20px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);font-size:12px;font-weight:700;position:relative;transition:background .2s}
.banner-btn:hover{background:rgba(255,255,255,.25)}

.sec{padding:0 14px;margin-bottom:20px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:15px;font-weight:700}
.sec-link{font-size:11px;color:#a855f7;font-weight:600;cursor:pointer}

.course{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.course:hover{border-color:rgba(124,58,237,.2);transform:translateY(-1px)}
.course-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.course-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.course-info{flex:1;min-width:0}
.course-name{font-size:13px;font-weight:700;line-height:1.3}
.course-code{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.course-pct{font-size:13px;font-weight:700;flex-shrink:0}
.prog-bar{height:6px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width 1s ease}

.resource{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.resource:hover{border-color:rgba(124,58,237,.2)}
.res-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.res-info{flex:1;min-width:0}
.res-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-meta{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
.res-dl{color:#a855f7;font-size:13px;flex-shrink:0}

.deadline{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.deadline:last-child{border-bottom:none}
.dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dl-info{flex:1;min-width:0}
.dl-name{font-size:13px;font-weight:600}
.dl-course{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.dl-date{font-size:11px;font-weight:700;text-align:right;flex-shrink:0}
.dl-days{font-size:9px;font-weight:500;text-align:right;margin-top:1px;opacity:.5}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:60px;display:flex;align-items:center;justify-content:space-around;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06);z-index:200}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;color:rgba(255,255,255,.3);transition:color .2s}
.nb i{font-size:19px}
.nb.on{color:#a855f7}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:11px 20px;background:rgba(124,58,237,.92);backdrop-filter:blur(12px);color:#fff;border-radius:12px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<header class="hdr">
<div class="hdr-row">
<div class="hdr-title">StudyHub</div>
<div class="hdr-btn" onclick="window.location.href='search.html'"><i class="fas fa-search"></i></div>
</div>
</header>

<div class="banner" onclick="window.location.href='studyhub-progress.html'">
<h2>Keep learning, keep growing!</h2>
<p>Track your progress and access study resources</p>
<div class="banner-btn"><i class="fas fa-chart-line"></i> View Progress</div>
</div>

<div class="sec">
<div class="sec-head">
<div class="sec-title">My Courses</div>
<div class="sec-link" onclick="window.location.href='studyhub-courses.html'">See all</div>
</div>
<div id="courseList"></div>
</div>

<div class="sec">
<div class="sec-head">
<div class="sec-title">Recent Resources</div>
<div class="sec-link" onclick="window.location.href='studyhub-resources.html'">See all</div>
</div>
<div id="resList"></div>
</div>

<div class="sec">
<div class="sec-head">
<div class="sec-title">Upcoming Deadlines</div>
</div>
<div id="dlList"></div>
</div>

<nav class="bnav">
<div class="nb" onclick="window.location.href='home.html'"><i class="fas fa-home"></i><span>Home</span></div>
<div class="nb" onclick="window.location.href='explore.html'"><i class="fas fa-compass"></i><span>Explore</span></div>
<div class="nb" onclick="window.location.href='chat.html'"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
<div class="nb on" onclick="window.location.href='studyhub.html'"><i class="fas fa-book-open"></i><span>StudyHub</span></div>
<div class="nb" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
</nav>

<script>
var courses=[
  {name:'Data Structures & Algorithms',code:'CSC 301',pct:78,color:'#7c3aed',icon:'fa-code',page:'course-dsa.html'},
  {name:'Calculus II',code:'MTH 202',pct:65,color:'#06b6d4',icon:'fa-square-root-variable',page:'course-calculus.html'},
  {name:'Physics Mechanics',code:'PHY 201',pct:42,color:'#ef4444',icon:'fa-atom',page:'course-physics.html'}
];

var resources=[
  {name:'Lecture Notes - Week 8',type:'PDF',size:'2.1 MB',color:'#ef4444',icon:'fa-file-pdf',page:'studyhub-resources.html'},
  {name:'Practice Problems Set',type:'DOCX',size:'856 KB',color:'#3b82f6',icon:'fa-file-word',page:'studyhub-resources.html'},
  {name:'Exam Review Slides',type:'PPTX',size:'5.4 MB',color:'#f59e0b',icon:'fa-file-powerpoint',page:'studyhub-resources.html'}
];

var deadlines=[
  {name:'Assignment 5 - DSA',course:'CSC 301',date:'Jul 5',color:'#ef4444',days:'3 days left',page:'studyhub-deadlines.html'},
  {name:'Lab Report - Mechanics',course:'PHY 201',date:'Jul 8',color:'#f59e0b',days:'6 days left',page:'studyhub-deadlines.html'},
  {name:'Quiz 3 - Calculus',course:'MTH 202',date:'Jul 10',color:'#06b6d4',days:'8 days left',page:'studyhub-deadlines.html'}
];

function renderCourses(){
  document.getElementById('courseList').innerHTML=courses.map(function(c){
    return'<div class="course" onclick="window.location.href=\''+c.page+'\'"><div class="course-top"><div class="course-ic" style="background:'+c.color+'15;color:'+c.color+'"><i class="fas '+c.icon+'"></i></div><div class="course-info"><div class="course-name">'+c.name+'</div><div class="course-code">'+c.code+'</div></div><div class="course-pct" style="color:'+c.color+'">'+c.pct+'%</div></div><div class="prog-bar"><div class="prog-fill" style="width:'+c.pct+'%;background:'+c.color+'"></div></div></div>';
  }).join('');
}

function renderResources(){
  document.getElementById('resList').innerHTML=resources.map(function(r){
    return'<div class="resource" onclick="window.location.href=\''+r.page+'\'"><div class="res-ic" style="background:'+r.color+'15;color:'+r.color+'"><i class="fas '+r.icon+'"></i></div><div class="res-info"><div class="res-name">'+r.name+'</div><div class="res-meta">'+r.type+' · '+r.size+'</div></div><div class="res-dl"><i class="fas fa-download"></i></div></div>';
  }).join('');
}

function renderDeadlines(){
  document.getElementById('dlList').innerHTML=deadlines.map(function(d){
    return'<div class="deadline" onclick="window.location.href=\''+d.page+'\'"><div class="dl-dot" style="background:'+d.color+'"></div><div class="dl-info"><div class="dl-name">'+d.name+'</div><div class="dl-course">'+d.course+'</div></div><div><div class="dl-date" style="color:'+d.color+'">'+d.date+'</div><div class="dl-days">'+d.days+'</div></div></div>';
  }).join('');
}

function showMsg(t){var d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(function(){d.remove()},2500)}

renderCourses();
renderResources();
renderDeadlines();
</script>
</body>
</html>
