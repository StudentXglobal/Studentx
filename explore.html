<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>StudentX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:Poppins,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.up{text-align:center}
.logo{font-size:54px;font-weight:900;letter-spacing:-1px}
.logo .s{color:#fff}
.logo .x{background:linear-gradient(135deg,#7c3aed,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tag{margin-top:16px;font-size:11px;font-weight:600;letter-spacing:4px}
.tag .a{color:#7c3aed}.tag .b{color:#a855f7}.tag .c{color:#06b6d4}.tag .d{color:#10b981}
.dn{position:fixed;bottom:70px;text-align:center}
.dn .cr{width:34px;height:34px;margin:0 auto;border:3px solid rgba(255,255,255,.07);border-top-color:#7c3aed;border-right-color:#a855f7;border-bottom-color:#06b6d4;border-radius:50%;animation:sp 1s linear infinite}
.dn .tx{color:rgba(255,255,255,.3);font-size:10px;letter-spacing:3px;font-weight:600;margin-top:10px;animation:bk 1.5s ease infinite}
.dn .br{width:120px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;margin:10px auto 0;overflow:hidden}
.dn .br i{display:block;height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#a855f7,#06b6d4);border-radius:2px;animation:gr 3.5s ease forwards}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes bk{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes gr{to{width:100%}}
</style>
</head>
<body>
<div class="up">
<div class="logo"><span class="s">Student</span><span class="x">X</span></div>
<div class="tag">
<span class="a">CONNECT.</span>
<span class="b">LEARN.</span>
<span class="c">SHARE.</span>
<span class="d">GROW.</span>
</div>
</div>
<div class="dn">
<div class="cr"></div>
<div class="tx">Loading...</div>
<div class="br"><i></i></div>
</div>
<script>
setTimeout(function(){window.location.href="login.html"},4000);
</script>
</body>
</html>
