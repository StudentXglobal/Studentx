<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>StudentX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.wrap{text-align:center;margin-top:-40px}
.brand{font-size:46px;font-weight:900;letter-spacing:-1.5px;color:#ffffff;line-height:1}
.brand b{font-weight:900;background:linear-gradient(135deg,#8b5cf6,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:42px}
.sub{margin-top:14px;font-size:11px;font-weight:600;letter-spacing:4px}
.c1{color:#8b5cf6}.c2{color:#c084fc}.c3{color:#22d3ee}.c4{color:#34d399}
.bot{position:fixed;bottom:70px;display:flex;flex-direction:column;align-items:center;gap:14px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,0.06);border-top-color:#8b5cf6;border-bottom-color:#c084fc;border-radius:50%;animation:sp .9s linear infinite}
.pbar{width:140px;height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.pfill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,#8b5cf6,#a855f7,#22d3ee);animation:pf 3.5s ease forwards}
.ltxt{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;font-weight:600;animation:pl 1.5s ease infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pf{to{width:100%}}
@keyframes pl{0%,100%{opacity:.3}50%{opacity:.7}}
</style>
</head>
<body>
<div class="wrap">
<div class="brand">Student <b>X</b></div>
<div class="sub">
<span class="c1">CONNECT.</span>
<span class="c2">LEARN.</span>
<span class="c3">SHARE.</span>
<span class="c4">GROW.</span>
</div>
</div>
<div class="bot">
<div class="spin"></div>
<div class="pbar"><div class="pfill"></div></div>
<div class="ltxt">Loading...</div>
</div>
<script>setTimeout(function(){window.location.href="login.html"},4000)</script>
</body>
</html>
