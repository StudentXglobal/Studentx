<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX | Explore</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #0B1121; --bg-card: #151C33; --text-main: #FFFFFF;
            --text-sub: #94A3B8; --accent-purple: #7C3AED;
            --border-color: #263152;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-main); padding-bottom: 100px; }

        /* Header */
        .header { background: rgba(11, 17, 33, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .search-box { background: var(--bg-card); display: flex; align-items: center; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--border-color); }
        .search-box input { background: transparent; border: none; color: white; width: 100%; margin-left: 10px; outline: none; }

        /* Categories */
        .categories { display: flex; padding: 20px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-chip { padding: 8px 20px; background: var(--bg-card); border-radius: 20px; font-size: 14px; white-space: nowrap; border: 1px solid var(--border-color); }
        .cat-chip.active { background: var(--accent-purple); }

        /* Explore Grid */
        .explore-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .explore-item { background: var(--bg-card); border-radius: 16px; height: 180px; position: relative; overflow: hidden; border: 1px solid var(--border-color); }
        .explore-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .item-overlay { position: absolute; bottom: 0; padding: 10px; font-size: 12px; font-weight: bold; background: linear-gradient(transparent, rgba(0,0,0,0.8)); width: 100%; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(11, 17, 33, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; padding: 15px 25px; z-index: 1000; }
        .nav-link { text-align: center; color: var(--text-sub); text-decoration: none; font-size: 11px; }
        .nav-link.active { color: var(--accent-purple); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .chat-center { background: var(--accent-purple); padding: 12px; border-radius: 50%; margin-top: -25px; color: white; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>

    <header class="header">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass" style="color:var(--text-sub)"></i>
            <input type="text" placeholder="Search for students, notes...">
        </div>
    </header>

    <div class="categories">
        <div class="cat-chip active">All</div>
        <div class="cat-chip">Science</div>
        <div class="cat-chip">Math</div>
        <div class="cat-chip">Coding</div>
        <div class="cat-chip">Art</div>
    </div>

    <div class="explore-grid" id="grid">
        <script>
            // Grid na hotuna 12
            for(let i=1; i<=12; i++) {
                document.write(`
                <div class="explore-item">
                    <div style="background:linear-gradient(45deg, #7C3AED, #4F46E5); height:100%; display:flex; align-items:center; justify-content:center;">
                        <i class="fa-solid fa-graduation-cap" style="font-size:30px; opacity:0.5"></i>
                    </div>
                    <div class="item-overlay">Topic ${i}</div>
                </div>`);
            }
        </script>
    </div>

    <nav class="nav-bar">
        <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="explore.html" class="nav-link active"><i class="fa-solid fa-compass"></i> Explore</a>
        <a href="chat.html" class="nav-link chat-center"><i class="fa-solid fa-message"></i></a>
        <a href="studyhub.html" class="nav-link"><i class="fa-solid fa-book"></i> Study</a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i> Profile</a>
    </nav>

</body>
</html>
