<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX - Explore</title>
    <style>
        :root { --primary: #4f46e5; --text: #1e293b; --muted: #94a3b8; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; color: var(--text); padding-bottom: 85px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #ffffff; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 20px; font-weight: 700; }
        
        /* Search Bar */
        .search-area { padding: 15px 20px; background: #ffffff; }
        .search-box { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border); }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 15px; }
        
        /* Categories */
        .cat-scroll { display: flex; overflow-x: auto; padding: 10px 20px; gap: 15px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 600; background: white; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <a href="menu.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></a>
        <h1>Explore</h1>
        <a href="notifications.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path></svg></a>
    </div>

    <div class="search-area">
        <div class="search-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Search students, posts, communities...">
        </div>
    </div>

    <div class="cat-scroll">
        <button class="cat-btn active">All</button>
        <button class="cat-btn">Academic</button>
        <button class="cat-btn">Scholarships</button>
        <button class="cat-btn">Careers</button>
    </div>
<div id="resultsContainer" style="padding: 20px;">
        <!-- Nan ne sakamakon search zai bayyana -->
    </div>

    <div id="defaultContent">
        <div style="padding: 0 20px 20px;">
            <h3 style="font-size: 16px; margin-bottom: 10px;">Trending Topics</h3>
            <div id="trendingList">
                <div style="display:flex; justify-content:space-between; padding:10px 0;"><span>#AI in Education</span><span style="color:var(--muted);">12.5K</span></div>
                <div style="display:flex; justify-content:space-between; padding:10px 0;"><span>#Exam Tips</span><span style="color:var(--muted);">9.8K</span></div>
            </div>
        </div>
    </div>
    <!-- Bottom Navigation -->
    <div style="position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; padding:10px 0; background:white; border-top:1px solid var(--border); z-index:999;">
        <a href="home.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--muted);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V21a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"></path></svg>
            <span style="font-size:10px;">Home</span>
        </a>
        <a href="explore.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--primary);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
            <span style="font-size:10px;">Explore</span>
        </a>
        <a href="chat.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--muted);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            <span style="font-size:10px;">Chat</span>
        </a>
        <a href="studyhub.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--muted);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V5a2 2 0 0 0-2-2H4v16h6a2 2 0 0 1 2 2z"></path></svg>
            <span style="font-size:10px;">StudyHub</span>
        </a>
        <a href="profile.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--muted);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle></svg>
            <span style="font-size:10px;">Profile</span>
        </a>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const defaultContent = document.getElementById('defaultContent');

        // Search Data (Simulated Database)
        const mockData = [
            { name: "Computer Science Hub", type: "Community", sponsored: false },
            { name: "Sponsored: Advanced Python Course", type: "Course", sponsored: true },
            { name: "Fatima Muhammad", type: "Person", sponsored: false },
            { name: "Sponsored: ABU Zaria Alumni Network", type: "Community", sponsored: true }
        ];

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            if(query.length > 0) {
                defaultContent.style.display = 'none';
                resultsContainer.innerHTML = '';
                
                // Sorting: Sponsored results first
                const filtered = mockData.filter(item => item.name.toLowerCase().includes(query))
                                         .sort((a, b) => b.sponsored - a.sponsored);

                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.style.padding = '10px';
                    div.style.borderBottom = '1px solid #eee';
                    div.innerHTML = `<strong>${item.name}</strong><br><small style="color:var(--muted)">${item.type} ${item.sponsored ? ' - Sponsored' : ''}</small>`;
                    resultsContainer.appendChild(div);
                });
            } else {
                defaultContent.style.display = 'block';
                resultsContainer.innerHTML = '';
            }
        });
    </script>
</body>
</html>
