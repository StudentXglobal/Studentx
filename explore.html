<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>StudentX - Explore</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Poppins,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;padding-bottom:70px}
.hdr{position:sticky;top:0;z-index:100;padding:10px 14px;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:12px}
.search{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;transition:border-color .2s}
.search:focus-within{border-color:#7c3aed}
.search i{color:rgba(255,255,255,.3);font-size:14px}
.search input{flex:1;border:none;background:none;color:#fff;font-size:13px}
.search input::placeholder{color:rgba(255,255,255,.25)}
.cats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 14px}
.cat{padding:18px 12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);text-align:center;cursor:pointer;transition:all .2s}
.cat:hover{border-color:rgba(124,58,237,.3);transform:translateY(-2px)}
.cat i{font-size:22px;display:block;margin-bottom:8px}
.cat span{font-size:11px;font-weight:600;color:rgba(255,255,255,.6)}
.sec-title{font-size:15px;font-weight:700;padding:0 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sec-title a{font-size:11px;color:#a855f7;font-weight:600}
.trending{padding:0 14px;margin-bottom:20px}
.trend-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.trend-num{font-size:16px;font-weight:800;color:rgba(255,255,255,.15);width:24px;text-align:center;flex-shrink:0}
.trend-info{flex:1;min-width:0}
.trend-tag{font-size:12px;font-weight:700;color:#a855f7}
.trend-text{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trend-posts{font-size:10px;color:rgba(255,255,255,.25);flex-shrink:0}
.people{padding:0 14px;margin-bottom:20px}
.person{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.person img{width:44px;height:44px;border-radius:50%;object-fit:cover;cursor:pointer}
.person-info{flex:1;min-width:0;cursor:pointer}
.person-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px}
.person-name .vd{color:#a855f7;font-size:10px}
.person-school{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
.person-btn{padding:7px 16px;border-radius:20px;font-size:11px;font-weight:700;transition:all .15s}
.person-btn.fl{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.08)}
.person-btn.fl:hover{border-color:#a855f7;color:#a855f7}
.person-btn.fo{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.schools{padding:0 14px;margin-bottom:20px}
.school{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.school:hover{border-color:rgba(124,58,237,.3)}
.school-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.school-info{flex:1;min-width:0}
.school-name{font-size:13px;font-weight:700}
.school-meta{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.school-arrow{color:rgba(255,255,255,.2);font-size:12px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:60px;display:flex;align-items:center;justify-content:space-around;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06);z-index:200}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;color:rgba(255,255,255,.3);transition:color .2s}
.nb i{font-size:19px}
.nb.on{color:#a855f7}
.sr{padding:0 14px;display:none;margin-bottom:20px}
.sr.show{display:block}
.sr-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sr-label i{color:#f59e0b;font-size:10px}
.sr-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.sr-item:hover{border-color:rgba(124,58,237,.3)}
.sr-item img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.sr-item .si-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sr-item .si-info{flex:1;min-width:0}
.sr-item .si-name{font-size:13px;font-weight:700}
.sr-item .si-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
.sr-item .si-arrow{color:rgba(255,255,255,.2);font-size:12px}
.no-result{text-align:center;padding:40px 20px;color:rgba(255,255,255,.2)}
.no-result i{font-size:32px;margin-bottom:10px;display:block}
.no-result p{font-size:13px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:11px 20px;background:rgba(124,58,237,.92);backdrop-filter:blur(12px);color:#fff;border-radius:12px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<header class="hdr">
<div class="hdr-title">Explore</div>
<div class="search">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="Search students, schools, topics..." oninput="doSearch(this.value)">
</div>
</header>

<div id="mainContent">
<div class="cats">
<div class="cat" onclick="window.location.href='explore-trending.html'"><i class="fas fa-fire" style="color:#ef4444"></i><span>Trending</span></div>
<div class="cat" onclick="window.location.href='explore-students.html'"><i class="fas fa-user-friends" style="color:#a855f7"></i><span>Students</span></div>
<div class="cat" onclick="window.location.href='explore-schools.html'"><i class="fas fa-university" style="color:#06b6d4"></i><span>Schools</span></div>
<div class="cat" onclick="window.location.href='groups.html'"><i class="fas fa-users" style="color:#10b981"></i><span>Groups</span></div>
<div class="cat" onclick="window.location.href='scholarship.html'"><i class="fas fa-award" style="color:#f59e0b"></i><span>Scholarships</span></div>
<div class="cat" onclick="window.location.href='events.html'"><i class="fas fa-calendar-alt" style="color:#ec4899"></i><span>Events</span></div>
</div>

<div class="sec-title">Trending Topics <a href="explore-trending.html">See all</a></div>
<div class="trending" id="trendList"></div>

<div class="sec-title">Suggested Students <a href="explore-students.html">See all</a></div>
<div class="people" id="peopleList"></div>

<div class="sec-title">Popular Schools <a href="explore-schools.html">See all</a></div>
<div class="schools" id="schoolList"></div>
</div>

<div class="sr" id="searchResults"></div>

<nav class="bnav">
<div class="nb" onclick="window.location.href='home.html'"><i class="fas fa-home"></i><span>Home</span></div>
<div class="nb on" onclick="window.location.href='explore.html'"><i class="fas fa-compass"></i><span>Explore</span></div>
<div class="nb" onclick="window.location.href='chat.html'"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
<div class="nb" onclick="window.location.href='studyhub.html'"><i class="fas fa-book-open"></i><span>StudyHub</span></div>
<div class="nb" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
</nav>

<script>
var trends=[
  {tag:'#ExamPrep',text:'Students sharing exam tips and tricks',posts:'12.4K'},
  {tag:'#CampusLife',text:'Life on campus across Nigerian universities',posts:'8.9K'},
  {tag:'#Scholarship2024',text:'Latest scholarship opportunities for African students',posts:'5.2K'},
  {tag:'#CSStudents',text:'Computer science students connecting and sharing',posts:'4.7K'},
  {tag:'#FinalYear',text:'Final year students discussing projects and theses',posts:'3.1K'}
];

var people=[
  {name:'Fatima Muhammad',school:'UNILAG · Medicine',avatar:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop',verified:true,followed:false,page:'profile-fatima.html'},
  {name:'David Okafor',school:'FUT Minna · Engineering',avatar:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop',verified:false,followed:false,page:'profile-david.html'},
  {name:'Aisha Bello',school:'Bayero Univ · Law',avatar:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop',verified:true,followed:false,page:'profile-aisha.html'},
  {name:'Emeka Nwankwo',school:'UNN · Economics',avatar:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop',verified:false,followed:false,page:'profile-emeka.html'}
];

var schools=[
  {name:'Ahmadu Bello University',meta:'12.5K students · Zaria',color:'#7c3aed',icon:'fa-graduation-cap',page:'school-abu.html'},
  {name:'University of Lagos',meta:'9.8K students · Lagos',color:'#06b6d4',icon:'fa-university',page:'school-unilag.html'},
  {name:'University of Ibadan',meta:'8.2K students · Ibadan',color:'#10b981',icon:'fa-landmark',page:'school-ui.html'},
  {name:'Bayero University Kano',meta:'7.1K students · Kano',color:'#f59e0b',icon:'fa-school',page:'school-buk.html'}
];

var sponsored=[
  {name:'Agbami Scholarship',sub:'For Nigerian university students',icon:'fa-award',color:'#f59e0b',page:'scholarship.html'},
  {name:'ABU Postgraduate Form',sub:'Applications now open',icon:'fa-university',color:'#7c3aed',page:'school-abu.html'},
  {name:'StudentX Plus',sub:'Upgrade for premium features',icon:'fa-crown',color:'#a855f7',page:'settings.html'}
];

var allSearch=[
  {type:'student',name:'Fatima Muhammad',sub:'UNILAG · Medicine',avatar:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop',page:'profile-fatima.html'},
  {type:'student',name:'David Okafor',sub:'FUT Minna · Engineering',avatar:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop',page:'profile-david.html'},
  {type:'student',name:'Aisha Bello',sub:'Bayero Univ · Law',avatar:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop',page:'profile-aisha.html'},
  {type:'student',name:'Emeka Nwankwo',sub:'UNN · Economics',avatar:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop',page:'profile-emeka.html'},
  {type:'student',name:'Halima Yusuf',sub:'UDUS · Mass Comm',avatar:'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop',page:'profile-halima.html'},
  {type:'school',name:'Ahmadu Bello University',sub:'12.5K students · Zaria',icon:'fa-graduation-cap',color:'#7c3aed',page:'school-abu.html'},
  {type:'school',name:'University of Lagos',sub:'9.8K students · Lagos',icon:'fa-university',color:'#06b6d4',page:'school-unilag.html'},
  {type:'school',name:'University of Ibadan',sub:'8.2K students · Ibadan',icon:'fa-landmark',color:'#10b981',page:'school-ui.html'},
  {type:'school',name:'Bayero University Kano',sub:'7.1K students · Kano',icon:'fa-school',color:'#f59e0b',page:'school-buk.html'},
  {type:'school',name:'FUT Minna',sub:'5.4K students · Minna',icon:'fa-cogs',color:'#ef4444',page:'school-fut.html'},
  {type:'school',name:'UNN',sub:'6.8K students · Nsukka',icon:'fa-book',color:'#3b82f6',page:'school-unn.html'},
  {type:'topic',name:'#ExamPrep',sub:'12.4K posts',icon:'fa-fire',color:'#ef4444',page:'explore-trending.html'},
  {type:'topic',name:'#CampusLife',sub:'8.9K posts',icon:'fa-fire',color:'#f59e0b',page:'explore-trending.html'},
  {type:'topic',name:'#Scholarship2024',sub:'5.2K posts',icon:'fa-award',color:'#10b981',page:'scholarship.html'},
  {type:'topic',name:'#CSStudents',sub:'4.7K posts',icon:'fa-code',color:'#a855f7',page:'explore-trending.html'}
];

function renderTrends(){
  document.getElementById('trendList').innerHTML=trends.map(function(t,i){
    return'<div class="trend-item" onclick="window.location.href=\'explore-trending.html\'"><div class="trend-num">'+(i+1)+'</div><div class="trend-info"><div class="trend-tag">'+t.tag+'</div><div class="trend-text">'+t.text+'</div></div><div class="trend-posts">'+t.posts+' posts</div></div>';
  }).join('');
}

function renderPeople(){
  document.getElementById('peopleList').innerHTML=people.map(function(p,i){
    return'<div class="person"><img src="'+p.avatar+'" onclick="window.location.href=\''+p.page+'\'" alt=""><div class="person-info" onclick="window.location.href=\''+p.page+'\'"><div class="person-name">'+p.name+(p.verified?' <i class="fas fa-check-circle vd"></i>':'')+'</div><div class="person-school">'+p.school+'</div></div><button class="person-btn '+(p.followed?'fo':'fl')+'" onclick="event.stopPropagation();toggleFollow('+i+')">'+(p.followed?'Following':'Follow')+'</button></div>';
  }).join('');
}

function renderSchools(){
  document.getElementById('schoolList').innerHTML=schools.map(function(s){
    return'<div class="school" onclick="window.location.href=\''+s.page+'\'"><div class="school-icon" style="background:'+s.color+'15;color:'+s.color+'"><i class="fas '+s.icon+'"></i></div><div class="school-info"><div class="school-name">'+s.name+'</div><div class="school-meta">'+s.meta+'</div></div><i class="fas fa-chevron-right school-arrow"></i></div>';
  }).join('');
}

function toggleFollow(i){
  people[i].followed=!people[i].followed;
  renderPeople();
  showMsg(people[i].followed?'Following '+people[i].name:'Unfollowed '+people[i].name);
}

function doSearch(v){
  var main=document.getElementById('mainContent');
  var sr=document.getElementById('searchResults');
  if(v.length<2){main.style.display='block';sr.classList.remove('show');return}
  main.style.display='none';
  sr.classList.add('show');
  var low=v.toLowerCase();
  var found=allSearch.filter(function(item){return item.name.toLowerCase().indexOf(low)!==-1||item.sub.toLowerCase().indexOf(low)!==-1});
  var h='';
  var sp=sponsored.filter(function(s){return s.name.toLowerCase().indexOf(low)!==-1||s.sub.toLowerCase().indexOf(low)!==-1});
  if(sp.length>0){
    h+='<div class="sr-label"><i class="fas fa-ad"></i> Sponsored</div>';
    sp.forEach(function(s){
      h+='<div class="sr-item" onclick="window.location.href=\''+s.page+'\'"><div class="si-icon" style="background:'+s.color+'15;color:'+s.color+'"><i class="fas '+s.icon+'"></i></div><div class="si-info"><div class="si-name">'+s.name+'</div><div class="si-sub">'+s.sub+'</div></div><i class="fas fa-chevron-right si-arrow"></i></div>';
    });
  }
  if(found.length>0){
    h+='<div class="sr-label" style="margin-top:12px"><i class="fas fa-search"></i> Results</div>';
    found.forEach(function(item){
      if(item.type==='student'){
        h+='<div class="sr-item" onclick="window.location.href=\''+item.page+'\'"><img src="'+item.avatar+'" alt=""><div class="si-info"><div class="si-name">'+item.name+'</div><div class="si-sub">'+item.sub+'</div></div><i class="fas fa-chevron-right si-arrow"></i></div>';
      }else{
        h+='<div class="sr-item" onclick="window.location.href=\''+item.page+'\'"><div class="si-icon" style="background:'+item.color+'15;color:'+item.color+'"><i class="fas '+item.icon+'"></i></div><div class="si-info"><div class="si-name">'+item.name+'</div><div class="si-sub">'+item.sub+'</div></div><i class="fas fa-chevron-right si-arrow"></i></div>';
      }
    });
  }
  if(!h){h='<div class="no-result"><i class="fas fa-search"></i><p>No results for "'+v+'"</p></div>'}
  sr.innerHTML=h;
}

function showMsg(t){
  var d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);
  setTimeout(function(){d.remove()},2500);
}

renderTrends();
renderPeople();
renderSchools();
</script>
</body>
</html>
