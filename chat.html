<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Detail - StudentX</title>
    <style>
        :root { --primary: #4f46e5; --text: #1e293b; --inactive: #94a3b8; --border: #e2e8f0; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); padding-bottom: 140px; height: 100vh; }

        /* Header */
        .chat-header { display: flex; align-items: center; padding: 15px 20px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .back-btn { margin-right: 15px; color: black; display: flex; align-items: center; }
        .user-name { font-size: 18px; font-weight: 700; }

        /* Message Area */
        .chat-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { background: white; padding: 12px 16px; border-radius: 18px 18px 4px 18px; border: 1px solid var(--border); max-width: 80%; align-self: flex-end; cursor: pointer; color: var(--text); }
        .bubble.received { background: #e0e7ff; align-self: flex-start; border-radius: 18px 18px 18px 4px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="chat.html" class="back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></a>
        <span class="user-name">Fatima Muhammad</span>
    </div>

    <div class="chat-body">
        <div class="bubble received" onclick="openMsgMenu()">Thanks! That really helps.</div>
        <div class="bubble" onclick="openMsgMenu()">Data structures are tricky but interesting.</div>
    </div>
    <!-- Context Menu (Delete, React, Forward) -->
    <div id="msgMenu" style="display:none; position:fixed; bottom:0; width:100%; background:white; padding:20px; border-radius:20px 20px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.1); z-index:1000;">
        <div style="padding:15px; font-weight:600; cursor:pointer;" onclick="closeMenu()">Reply</div>
        <div style="padding:15px; font-weight:600; cursor:pointer;" onclick="closeMenu()">React</div>
        <div style="padding:15px; font-weight:600; cursor:pointer;" onclick="closeMenu()">Forward</div>
        <div style="padding:15px; font-weight:600; color:red; cursor:pointer;" onclick="closeMenu()">Delete</div>
        <div style="padding:15px; text-align:center; color:var(--inactive); cursor:pointer;" onclick="closeMenu()">Cancel</div>
    </div>

    <!-- Input Bar -->
    <div style="position:fixed; bottom:80px; width:100%; background:white; padding:12px; display:flex; align-items:center; gap:10px; border-top:1px solid var(--border);">
        <!-- Camera Icon -->
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <!-- Voice Recorder Icon -->
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        
        <input type="text" style="flex:1; padding:12px; border-radius:25px; border:1px solid var(--border); background:#f1f5f9; outline:none;" placeholder="Type a message...">
        
        <!-- View Once (Eye) Icon -->
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <!-- Nav Bar (Exact copy from your Home Feed) -->
    <div style="position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; align-items:center; padding:10px 0; background:white; border-top:1px solid var(--border); z-index:999;">
        <a href="home.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--inactive); flex:1;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V21a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/></svg><span style="font-size:11px;">Home</span></a>
        <a href="explore.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--inactive); flex:1;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg><span style="font-size:11px;">Explore</span></a>
        <a href="chat.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--primary); flex:1;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span style="font-size:11px; font-weight:700;">Chat</span></a>
        <a href="studyhub.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--inactive); flex:1;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21V5a2 2 0 0 0-2-2H4v16h6a2 2 0 0 1 2 2z"/><path d="M12 21V5a2 2 0 0 1 2-2h6v16h-6a2 2 0 0 0-2 2z"/></svg><span style="font-size:11px;">StudyHub</span></a>
        <a href="profile.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; color:var(--inactive); flex:1;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6 19a6 6 0 0 1 12 0"/></svg><span style="font-size:11px;">Profile</span></a>
    </div>

    <script>
        function openMsgMenu() { document.getElementById('msgMenu').style.display = 'block'; }
        function closeMenu() { document.getElementById('msgMenu').style.display = 'none'; }
    </script>
</body>
</html>
