<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX — Premium Chat Engine</title>
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #050918;
            --surface-glass: rgba(255, 255, 255, 0.03);
            --surface-glass-bright: rgba(255, 255, 255, 0.08);
            --surface-glass-card: rgba(11, 18, 38, 0.7);
            --border-glass: 1px solid rgba(255, 255, 255, 0.06);
            --border-glass-bright: 1px solid rgba(255, 255, 255, 0.12);
            
            --brand-primary: #8B5CF6;
            --brand-secondary: #3B82F6;
            --brand-gradient: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
            --ai-gradient: linear-gradient(135deg, #EC4899 0%, #8B5CF6 100%);
            
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            
            --status-online: #10B981;
            --radius-main: 24px;
            --radius-inner: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: rgba(5, 9, 24, 0.6);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        /* Premium Header Setup matching Screenshot_20260706-194532.png */
        .main-header {
            padding: 20px;
            background: rgba(5, 9, 24, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 90;
            border-bottom: var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-trigger-mask {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-inner);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .profile-trigger-mask i {
            color: #C084FC;
            font-size: 20px;
        }

        .screen-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-inner);
            background: var(--surface-glass);
            border: var(--border-glass);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Segmented Navigation Switch */
        .tab-segment-container {
            padding: 4px;
            background: rgba(255, 255, 255, 0.02);
            border: var(--border-glass);
            border-radius: var(--radius-inner);
            display: flex;
            margin: 10px 20px 20px 20px;
        }
        .segment-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border-radius: calc(var(--radius-inner) - 4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .segment-btn.active {
            background: var(--brand-gradient);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        /* Feed Display */
        .directory-view-scroll {
            flex: 1;
            padding: 0 20px 120px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Conversation Cards */
        .convo-card {
            background: var(--surface-glass-card);
            border: var(--border-glass);
            border-radius: var(--radius-main);
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .convo-card.ai-assistant-card {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.07) 0%, rgba(139, 92, 246, 0.07) 100%);
            border: 1px solid rgba(236, 72, 153, 0.25);
        }

        .avatar-container {
            position: relative;
            width: 54px;
            height: 54px;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: calc(var(--radius-inner) + 2px);
            object-fit: cover;
            border: var(--border-glass-bright);
        }
        .ai-avatar-glow {
            background: var(--ai-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ai-avatar-glow i {
            font-size: 22px;
            color: var(--text-primary);
        }

        .online-dot {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 12px;
            height: 12px;
            background-color: var(--status-online);
            border: 2px solid #0b1226;
            border-radius: 50%;
        }

        .card-content-block {
            flex: 1;
            min-width: 0;
        }

        .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .verified-badge { color: #3B82F6; font-size: 13px; }
        .meta-timestamp { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        .card-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .msg-preview-text {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .voice-indicator-text { color: #3B82F6; display: inline-flex; align-items: center; gap: 4px; }

        .counter-badge {
            background: var(--brand-gradient);
            color: var(--text-primary);
            font-size: 10px;
            font-weight: 800;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* UNIFIED CLEAN MINIMALIST BOTTOM NAV BAR (WITH ALERT AT BOTTOM) */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(5, 9, 24, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: var(--border-glass);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 10px 28px 10px;
            z-index: 100;
        }
        .nav-link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            width: 52px;
            height: 52px;
            border-radius: var(--radius-inner);
            transition: all 0.25s ease;
        }
        .nav-link-item i { font-size: 22px; }
        
        /* Highlighting active chat button cleanly */
        .nav-link-item.active-nav-route {
            color: #8B5CF6;
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Sliding Chat Sheet Frame */
        .active-conversation-panel {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(150%);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: var(--bg-base);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-left: var(--border-glass);
            border-right: var(--border-glass);
        }
        .active-conversation-panel.panel-active-state { transform: translateX(-50%); }

        .convo-panel-header {
            padding: 16px 20px;
            background: rgba(5, 9, 24, 0.9);
            backdrop-filter: blur(30px);
            border-bottom: var(--border-glass);
            display: flex;
            align-items: center;
        }
        .header-left-convo { display: flex; align-items: center; gap: 14px; }
        .convo-meta-info { display: flex; flex-direction: column; }
        .convo-header-title { font-size: 16px; font-weight: 700; }
        .convo-header-status { font-size: 11px; color: var(--status-online); font-weight: 600; }

        .message-stream-track { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-row-wrapper { display: flex; width: 100%; }
        .msg-row-wrapper.received-state { justify-content: flex-start; }
        .msg-row-wrapper.sent-state { justify-content: flex-end; }
        .bubble-frame { max-width: 75%; padding: 14px 16px; border-radius: var(--radius-inner); font-size: 14px; line-height: 1.5; }
        .received-state .bubble-frame { background: rgba(255, 255, 255, 0.04); border: var(--border-glass); border-top-left-radius: 4px; }
        
        .convo-input-dock-footer { padding: 16px 20px; background: rgba(5, 9, 24, 0.95); border-top: var(--border-glass); }
        .input-glass-container { flex: 1; background: rgba(255,255,255,0.02); border: var(--border-glass); border-radius: var(--radius-inner); padding: 4px 6px 4px 14px; display: flex; align-items: center; }
        .text-typing-field { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 14px; padding: 12px 0; }
        .send-action-trigger { width: 42px; height: 42px; border-radius: 12px; background: var(--brand-gradient); border: none; color: var(--text-primary); display: flex; align-items: center; justify-content: center; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Premium Synchronized Header -->
        <header class="main-header">
            <div class="header-left">
                <div class="profile-trigger-mask">
                    <i class="fa-solid fa-mask"></i>
                </div>
                <h1 class="screen-title">StudentX</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button class="icon-btn"><i class="fa-solid fa-pen-to-square"></i></button>
            </div>
        </header>

        <!-- Segment Controller -->
        <div class="tab-segment-container">
            <button class="segment-btn active" id="tab-messages" onclick="switchTab('messages')">
                <i class="fa-solid fa-message"></i> Messages
            </button>
            <button class="segment-btn" id="tab-groups" onclick="switchTab('groups')">
                <i class="fa-solid fa-users"></i> Groups
            </button>
        </div>

        <!-- High-Fidelity Static Cards Track -->
        <main class="directory-view-scroll" id="mainDirectoryFeed">
            
            <!-- AI Card Segment -->
            <div class="convo-card ai-assistant-card msg-node-item" onclick="openChat('AI Study Assistant', true)">
                <div class="avatar-container">
                    <div class="avatar-img ai-avatar-glow"><i class="fa-solid fa-microchip"></i></div>
                    <div class="online-dot"></div>
                </div>
                <div class="card-content-block">
                    <div class="card-top-row">
                        <div class="card-title">AI Study Assistant <i class="fa-solid fa-circle-check verified-badge"></i></div>
                        <div class="meta-timestamp">07:04 PM</div>
                    </div>
                    <div class="card-bottom-row">
                        <span class="msg-preview-text">Quiz matrix generated successfully based on your notes.</span>
                    </div>
                </div>
            </div>

            <!-- Standard Chat Segment (Ahmad Musa) -->
            <div class="convo-card msg-node-item" onclick="openChat('Ahmad Musa', false)">
                <div class="avatar-container">
                    <img src="https://i.pravatar.cc/120?u=user88" class="avatar-img">
                    <div class="online-dot"></div>
                </div>
                <div class="card-content-block">
                    <div class="card-top-row">
                        <div class="card-title">Ahmad Musa <i class="fa-solid fa-circle-check verified-badge"></i></div>
                        <div class="meta-timestamp">06:12 PM</div>
                    </div>
                    <div class="card-bottom-row">
                        <span class="msg-preview-text voice-indicator-text"><i class="fa-solid fa-microphone"></i> Voice Note (0:42)</span>
                        <div class="counter-badge">2</div>
                    </div>
                </div>
            </div>

            <!-- Group Item Placeholder -->
            <div class="convo-card group-node-item" style="display: none;" onclick="openChat('Computer Science Devs', false)">
                <div class="avatar-container">
                    <img src="https://i.pravatar.cc/120?u=group12" class="avatar-img">
                </div>
                <div class="card-content-block">
                    <div class="card-top-row">
                        <div class="card-title">Computer Science Devs</div>
                        <div class="meta-timestamp">05:11 PM</div>
                    </div>
                    <div class="card-bottom-row">
                        <span class="msg-preview-text">Fatima Muhammad shared a PDF document.</span>
                        <div class="counter-badge">5</div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Minimalist Luxury Bottom Bar — Unified Layout with Alert at Bottom -->
        <nav class="bottom-nav-bar">
            <a href="home.html" class="nav-link-item"><i class="fa-solid fa-house"></i></a>
            <a href="explore.html" class="nav-link-item"><i class="fa-solid fa-compass"></i></a>
            <a href="studyhub.html" class="nav-link-item"><i class="fa-solid fa-book"></i></a>
            <a href="chat.html" class="nav-link-item active-nav-route"><i class="fa-solid fa-message"></i></a>
            <a href="notifications.html" class="nav-link-item"><i class="fa-solid fa-bell"></i></a>
            <a href="profile.html" class="nav-link-item"><i class="fa-solid fa-user"></i></a>
        </nav>

        <!-- Slide-In Chat Workspace Panel -->
        <div class="active-conversation-panel" id="activeConversationSheet">
            <header class="convo-panel-header">
                <div class="header-left-convo">
                    <button class="icon-btn" onclick="closeChat()" style="margin-right: 10px;"><i class="fa-solid fa-arrow-left"></i></button>
                    <div class="convo-meta-info">
                        <div class="convo-header-title" id="chatActiveTitle">AI Study Assistant</div>
                        <div class="convo-header-status">Online</div>
                    </div>
                </div>
            </header>

            <div class="message-stream-track" id="chatMessageTrack">
                <!-- Messages injection layer -->
            </div>

            <footer class="convo-input-dock-footer">
                <div class="dock-main-control-row" style="display: flex; align-items: center;">
                    <div class="input-glass-container">
                        <input type="text" class="text-typing-field" placeholder="Type secure message...">
                    </div>
                    <button class="send-action-trigger"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </footer>
        </div>

    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll(".segment-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(`tab-${tab}`).classList.add("active");
            
            const msgItems = document.querySelectorAll(".msg-node-item");
            const groupItems = document.querySelectorAll(".group-node-item");

            if(tab === "messages") {
                msgItems.forEach(i => i.style.display = "flex");
                groupItems.forEach(i => i.style.display = "none");
            } else {
                msgItems.forEach(i => i.style.display = "none");
                groupItems.forEach(i => i.style.display = "flex");
            }
        }

        function openChat(title, isAi) {
            document.getElementById("chatActiveTitle").innerText = title;
            const track = document.getElementById("chatMessageTrack");
            
            if(isAi) {
                track.innerHTML = `
                    <div class="msg-row-wrapper received-state">
                        <div class="bubble-frame">Barka da zuwa StudentX AI. Tura mini bayanan karatunka don samar maka da takaitaccen bayani (Summary).</div>
                    </div>`;
            } else {
                track.innerHTML = `
                    <div class="msg-row-wrapper received-state">
                        <div class="bubble-frame">Assalamu Alaikum, na tura maka sabon tsarin karatun da aka sabunta.</div>
                    </div>`;
            }
            document.getElementById("activeConversationSheet").classList.add("panel-active-state");
        }

        function closeChat() {
            document.getElementById("activeConversationSheet").classList.remove("panel-active-state");
        }
    </script>
</body>
</html>
