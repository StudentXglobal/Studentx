<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudentX Welcome</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
  }

  body{
    background: radial-gradient(circle at top, #0b1220, #05070d);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .app{
    width:100%;
    max-width:420px;
    padding:20px;
    text-align:center;
  }

  .logo{
    width:60px;
    height:60px;
    margin:0 auto 15px;
    background:#2563eb;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:22px;
  }

  h1{
    font-size:34px;
    font-weight:800;
    margin-bottom:5px;
  }

  h2{
    font-size:20px;
    color:#60a5fa;
    margin-bottom:15px;
  }

  p{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:20px;
  }

  /* Students */
  .students{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:20px 0;
  }

  .students img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:15px;
    border:2px solid #1f2937;
  }

  /* Buttons */
  .btn{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
  }

  .login{
    background:#2563eb;
    color:white;
  }

  .signup{
    background:transparent;
    border:1px solid #2563eb;
    color:#60a5fa;
  }

  .signup:hover{
    background:rgba(37,99,235,0.1);
  }

  .footer{
    margin-top:15px;
    font-size:12px;
    color:#64748b;
  }
</style>
</head>

<body>

<div class="app">

  <div class="logo">SX</div>

  <!-- REQUIRED TEXT -->
  <h1>Welcome</h1>
  <h2>To StudentX</h2>
  <p>Connect • Learn • Share</p>

  <!-- STUDENTS IMAGES -->
  <div class="students">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" />
    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c" />
    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d" />
    <img src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39" />
  </div>

  <!-- BUTTONS -->
  <button class="btn login" onclick="login()">Login</button>
  <button class="btn signup" onclick="signup()">Sign Up</button>

  <div class="footer">Build your future with StudentX</div>

</div>

<script>
  function login(){
    alert("Go to login page");
    // window.location.href = "login.html";
  }

  function signup(){
    alert("Go to signup page");
    // window.location.href = "signup.html";
  }
</script>

</body>
</html>
