<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX - Loading Screen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030310;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tsarin Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 70px;
        }
        
        .logo-text {
            font-size: 55px;
            font-weight: 800;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-x {
            font-size: 70px;
            background: linear-gradient(135deg, #007bff, #8A2BE2, #FF00FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: -5px;
        }
        
        .tagline {
            margin-top: 15px;
            font-size: 13px;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #007bff, #8A2BE2, #FF00FF, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sashen Loading */
        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 1. Abin Juyawa (Spinner) */
        .spinner {
            width: 45px;
            height: 45px;
            border: 6px dotted #2a2a4a;
            border-top-color: #007bff; /* Launin da zai rika juyawa */
            border-bottom-color: #FF00FF;
            border-radius: 50%;
            /* Wannan layin shine yake sa motion din juyawa 👇 */
            animation: juyawa 1.5s linear infinite; 
            margin-bottom: 20px;
        }

        .loading-text {
            color: #a0a0bf;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* 2. Layin Cikawa (Progress Bar) */
        .progress-container {
            width: 280px;
            height: 10px;
            background-color: #1a1a33;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007bff, #FF00FF);
            border-radius: 10px;
            /* Wannan layin shine yake sa motion din cikawa 👇 */
            animation: cikawa 2.5s ease-in-out infinite; 
        }

        /* DOKOKIN MOTION (KEYFRAMES) */
        
        /* Yadda juyawar zata kasance daga 0 degree zuwa 360 degree */
        @keyframes juyawa {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Yadda layin zai cika daga 0% zuwa 100% */
        @keyframes cikawa {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-text">
            Student<span class="logo-x">X</span>
        </div>
        <div class="tagline">CONNECT. LEARN. SHARE. GROW.</div>
    </div>

    <div class="loading-section">
        <!-- Nan ne alamar juyawar take -->
        <div class="spinner"></div>
        
        <div class="loading-text">Loading...</div>
        
        <!-- Nan ne layin da yake cikawa yake -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

</body>
</html>
