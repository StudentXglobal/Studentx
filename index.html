<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX - Exact Splash Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;1,800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #060613; /* Ainihin kalar hoton */
            color: white;
            font-family: 'Montserrat', sans-serif; /* Font mai kauri */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tsarin Logo Sak na Hoton */
        .logo-container {
            text-align: center;
            margin-bottom: 120px;
        }
        
        .logo-text-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-text {
            font-size: 72px; /* Girma kamar na hoton */
            font-weight: 700;
            letter-spacing: -3px;
        }
        
        .logo-x {
            font-size: 90px;
            font-weight: 800;
            font-style: italic; /* Dan lankwasa kadan */
            background: linear-gradient(135deg, #1877F2, #8A2BE2, #FF00FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: -12px; /* Yasa 'X' din ta dan shiga jikin 't' */
            margin-bottom: -15px;
        }
        
        .tagline {
            margin-top: 15px;
            font-size: 14px;
            letter-spacing: 6px;
            font-weight: 600;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Launukan Tagline daban-daban */
        .tag-blue { color: #1877F2; }
        .tag-purple { color: #8A2BE2; }
        .tag-pink { color: #FF00FF; }

        /* Sashen Loading */
        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Ainihin Digo-Digo Guda 12 kamar na hoton */
        .dots-spinner {
            position: relative;
            width: 45px;
            height: 45px;
            margin-bottom: 15px;
            /* Zai juya a hankali a cikin sakan 4 */
            animation: spin 4s linear infinite; 
        }

        .dot {
            position: absolute;
            width: 7px;
            height: 7px;
            background-color: #1a1a2e; /* Kalar duhu */
            border-radius: 50%;
            top: 0;
            left: 50%;
            transform-origin: 50% 22.5px; /* Cibiyar juyawa */
        }

        /* Sanya digo-digon a cikin da'ira da sanya musu kalar haske */
        .dot:nth-child(1) { transform: translateX(-50%) rotate(0deg); background-color: #1877F2; }
        .dot:nth-child(2) { transform: translateX(-50%) rotate(30deg); background-color: #4a4dff; }
        .dot:nth-child(3) { transform: translateX(-50%) rotate(60deg); background-color: #7b2cff; }
        .dot:nth-child(4) { transform: translateX(-50%) rotate(90deg); }
        .dot:nth-child(5) { transform: translateX(-50%) rotate(120deg); }
        .dot:nth-child(6) { transform: translateX(-50%) rotate(150deg); }
        .dot:nth-child(7) { transform: translateX(-50%) rotate(180deg); }
        .dot:nth-child(8) { transform: translateX(-50%) rotate(210deg); }
        .dot:nth-child(9) { transform: translateX(-50%) rotate(240deg); }
        .dot:nth-child(10) { transform: translateX(-50%) rotate(270deg); }
        .dot:nth-child(11) { transform: translateX(-50%) rotate(300deg); }
        .dot:nth-child(12) { transform: translateX(-50%) rotate(330deg); }

        .loading-text {
            color: #a0a0bf;
            font-size: 15px;
            margin-bottom: 25px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

            width: 250
