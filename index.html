<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>StudentX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(180deg,#6C3BFF,#8B5CFF);

min-height:100vh;

color:white;

}

.logo{

text-align:center;

padding-top:60px;

font-size:42px;

font-weight:bold;

}

.tag{

text-align:center;

opacity:.9;

margin-top:8px;

font-size:17px;

}

.main{

background:white;

width:90%;

margin:auto;

margin-top:40px;

border-radius:30px 30px 0 0;

padding:25px;

min-height:70vh;

color:black;

}

.title{

font-size:28px;

font-weight:bold;

}

.subtitle{

color:gray;

margin-top:8px;

}

.button{

background:#6C3BFF;

color:white;

padding:16px;

border-radius:16px;

text-align:center;

margin-top:20px;

font-weight:bold;

font-size:18px;

}

.card{

background:#f5f5f5;

padding:18px;

border-radius:18px;

margin-top:15px;

display:flex;

align-items:center;

gap:12px;

}

.icon{

font-size:28px;

}

.bottom{

position:fixed;

bottom:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:18px;

border-radius:25px 25px 0 0;

box-shadow:0 -3px 20px rgba(0,0,0,.1);

}

.bottom span{

font-size:24px;

}

</style>

</head>

<body>

<div class="logo">

StudentX

</div>

<div class="tag">

Connect • Learn • Share

</div>

<div class="main">

<div class="title">

Welcome Back 👋

</div>

<div class="subtitle">

The future of student networking

</div>

<div class="button">

Let's Go!

</div>

<div class="card">

<div class="icon">📚</div>

<div>

<b>Complete Profile</b>

<p>Finish setting up account</p>

</div>

</div>

<div class="card">

<div class="icon">👥</div>

<div>

<b>Find Friends</b>

<p>Connect with students</p>

</div>

</div>

<div class="card">

<div class="icon">🔥</div>

<div>

<b>Explore Content</b>

<p>Discover communities</p>

</div>

</div>

<div class="card">

<div class="icon">🏆</div>

<div>

<b>Earn Rewards</b>

<p>Gain XP and badges</p>

</div>

</div>

</div>

<div class="bottom">

<span>🏠</span>

<span>🔍</span>

<span>➕</span>

<span>💬</span>

<span>👤</span>

</div>

</body>

</html>
