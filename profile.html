<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>StudentX Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#0b0b12;

color:white;

padding-bottom:90px;

}

a{

text-decoration:none;

color:inherit;

}

.profile-header{

position:relative;

width:100%;

height:220px;

overflow:hidden;

}

.cover-photo{

width:100%;

height:100%;

object-fit:cover;

background:#222;

}

.profile-photo{

position:absolute;

left:25px;

bottom:-55px;

width:110px;

height:110px;

border-radius:50%;

border:5px solid #0b0b12;

object-fit:cover;

background:#222;

}

.menu-btn{

position:absolute;

top:18px;

right:18px;

width:42px;

height:42px;

border-radius:50%;

background:rgba(0,0,0,.45);

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

backdrop-filter:blur(10px);

cursor:pointer;

}

.profile-info{

margin-top:70px;

padding:20px;

}

.profile-name{

font-size:24px;

font-weight:700;

}

.profile-username{

margin-top:3px;

font-size:15px;

color:#9ca3af;

}

.profile-bio{

margin-top:16px;

line-height:1.7;

font-size:14px;

}

.joined{

margin-top:14px;

font-size:13px;

color:#8b8b95;

display:flex;

align-items:center;

gap:8px;

}

.stats{

margin-top:25px;

display:flex;

justify-content:space-between;

text-align:center;

}

.stat h3{

font-size:20px;

}

.stat p{

font-size:13px;

color:#9ca3af;

margin-top:3px;

}

</style>

</head>

<body>

<div class="profile-header">

<img id="coverPhoto"

class="cover-photo"

src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1200"

alt="Cover">

<img

id="profilePhoto"

class="profile-photo"

src="https://ui-avatars.com/api/?name=StudentX"

alt="Profile">

<div

class="menu-btn"

onclick="openMenu()">

<i class="fas fa-ellipsis-h"></i>

</div>

</div>

<div class="profile-info">

<h2

id="fullName"

class="profile-name">

Loading...

</h2>

<div

id="username"

class="profile-username">

@loading...

</div>

<div

id="bio"

class="profile-bio">

No bio yet.

</div>

<div class="joined">

<i class="far fa-calendar"></i>

<span id="joinedDate">

Joined July 2026

</span>

</div>

<div class="stats">

<div class="stat">

<h3 id="postsCount">0</h3>

<p>Posts</p>

</div>

<div class="stat">

<h3 id="followersCount">0</h3>

<p>Followers</p>

</div>

<div class="stat">

<h3 id="followingCount">0</h3>

<p>Following</p>

</div>

<div class="stat">

<h3 id="likesCount">0</h3>

<p>Likes</p>

</div>

</div>
<div class="profile-tabs">

<button class="tab active">
Posts
</button>

<button class="tab">
Media
</button>

<button class="tab">
Replies
</button>

</div>

<div id="postsContainer">

<div class="empty-posts">

<i class="fas fa-newspaper"></i>

<h3>No Posts Yet</h3>

<p>
Posts will appear here.
</p>

</div>

</div>

<div id="bottomMenu"
class="bottom-menu">

<div class="menu-sheet">

<div class="drag-line"></div>

<div class="menu-item"
onclick="editProfile()">

<i class="fas fa-user-edit"></i>

<span>Edit Profile</span>

</div>

<div class="menu-item"
onclick="changeProfilePhoto()">

<i class="fas fa-camera"></i>

<span>Change Profile Picture</span>

</div>

<div class="menu-item"
onclick="changeCoverPhoto()">

<i class="fas fa-image"></i>

<span>Change Cover Photo</span>

</div>

<div class="menu-item"
onclick="editBio()">

<i class="fas fa-pen"></i>

<span>Edit Bio</span>

</div>

<div class="menu-item"
onclick="openPrivacy()">

<i class="fas fa-lock"></i>

<span>Privacy</span>

</div>

<div class="menu-item"
onclick="requestVerification()">

<i class="fas fa-check-circle"></i>

<span>Request Verification</span>

</div>

<div class="menu-item"
onclick="openPremium()">

<i class="fas fa-crown"></i>

<span>StudentX Premium</span>

</div>

<div class="menu-item"
onclick="openSettings()">

<i class="fas fa-cog"></i>

<span>Settings</span>

</div>

</div>

</div>
<script>

function openMenu(){
document.getElementById("bottomMenu").style.display="block";
}

window.onclick=function(e){
const menu=document.getElementById("bottomMenu");
if(e.target===menu){
menu.style.display="none";
}
}

function editProfile(){
alert("Edit Profile - Coming Soon");
}

function changeProfilePhoto(){
alert("Change Profile Picture - Coming Soon");
}

function changeCoverPhoto(){
alert("Change Cover Photo - Coming Soon");
}

function editBio(){
alert("Edit Bio - Coming Soon");
}

function openPrivacy(){
alert("Privacy - Coming Soon");
}

function requestVerification(){
alert("Verification Request - Coming Soon");
}

function openPremium(){
alert("StudentX Premium - Coming Soon");
}

function openSettings(){
alert("Settings - Coming Soon");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="profile.js"></script>

</body>
    </html>
