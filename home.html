<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX — Premium Home Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #090d16; /* Deep Premium Dark */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Mobile App Container Framework */
        .app-framework {
            width: 100%;
            max-width: 480px;
            background-color: #0b111e;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* --- STICKY TOP HEADER --- */
        .app-header {
            background: rgba(11, 17, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 480px;
            z-index: 9999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .menu-hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background-color: #ffffff;
            border-radius: 2px;
        }

        .header-logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 18px;
            color: #94a3b8;
        }

        /* --- MAIN SCROLLABLE CONTENT --- */
        .scroll-content {
            padding-top: 75px;  /* Space for top header */
            padding-bottom: 95px; /* Large space to prevent bottom nav from blocking content */
            width: 100%;
        }

        /* --- STORIES LINK ROW --- */
        .stories-wrapper {
            display: flex;
            gap: 14px;
            padding: 16px 20px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stories-wrapper::-webkit-scrollbar {
            display: none;
        }

        .story-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 65px;
            cursor: pointer;
            text-decoration: none;
        }

        .story-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            margin-bottom: 6px;
        }

        .story-node.mine .story-ring {
            background: none;
            border: 2px dashed #475569;
            padding: 0;
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0b111e;
        }

        .story-label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* --- GLASSMORPHIC COMPOSER CARD --- */
        .composer-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 14px 16px;
            border-radius: 16px;
            padding: 16px;
        }

        .composer-profile-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .composer-profile-row img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
        }

        .composer-fake-input {
            color: #64748b;
            font-size: 14px;
        }

        .composer-tools {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

            align-items: center;
