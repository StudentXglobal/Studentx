<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX - Dark Mode Feed</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Dark Mode Colors */
            --bg-main: #0B1121;          /* Deep dark blue background */
            --bg-card: #151C33;          /* Slightly lighter card background */
            --bg-card-hover: #1E2746;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --border-color: #263152;
            --accent-purple: #6366F1;    /* Primary purple/blue */
            --accent-purple-hover: #4F46E5;
            --success-green: #10B981;
            --warning-orange: #F59E0B;
            --danger-red: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
        }

        /* Main App Container (Responsive) */
        .app-container {
            width: 100%;
            max-width: 900px;
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px; /* Space for bottom nav */
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            background-color: rgba(11, 17, 33, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            font-size: 20px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--accent-purple);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            font-size: 20px;
            color: var(--text-primary);
            position: relative;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--danger-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--bg-main);
        }

        .header-profile {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
        }
        
        .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background-color: var(--success-green);
            border-radius: 50%;
            border: 2px solid var(--bg-main);
        }

        /* --- Greeting --- */
        .greeting {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .greeting img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
        .greeting-text h2 {
            font-size: 18px;
            font-weight: 700;
        }
        .greeting-text p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* --- Create Post Input --- */
        .create-post {
            background-color: var(--bg-card);
            margin: 15px 20px;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-color);
        }
        .create-icon {
            color: var(--accent-purple);
            font-size: 20px;
            padding: 8px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
        }
        .create-post input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .create-post input::placeholder {
            color: var(--text-secondary);
        }
        .create-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .create-actions i {
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
        }
        .post-btn {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Stories --- */
        .stories-wrapper {
            display: flex;
            gap: 15px;
            padding: 10px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        
        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 65px;
        }
        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid var(--accent-purple);
            padding: 3px;
            position: relative;
        }
        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .story.create .story-ring {
            border: 2px dashed var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-card);
        }
        .story.create .story-ring i {
            font-size: 24px;
            color: var(--accent-purple);
        }
        .story-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            padding: 10px 20px;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            padding-bottom: 10px;
            white-space: nowrap;
            cursor: pointer;
        }
        .tab.active {
            color: var(--accent-purple);
            border-bottom: 2px solid var(--accent-purple);
        }
        .filter-icon {
            margin-left: auto;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* --- Main Content Grid (Responsive Layout) --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px;
        }
        @media (min-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr 300px; /* Two columns on larger screens */
            }
        }

        /* --- Announcement Card --- */
        .announcement {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            margin-bottom: 20px;
        }
        .ann-icon {
            width: 50px;
            height: 50px;
            background: var(--accent-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            flex-shrink: 0;
        }
        .ann-text h3 {
            font-size: 14px;
            font-weight: 700;
        }
        .ann-text p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .join-btn {
            background: transparent;
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
        }
        .close-ann {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
        }

        /* --- Post Cards --- */
        .post {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .post-user img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-user-info h4 {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge-contributor {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-purple);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .post-time {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }
        .post-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .post-text span {
            color: var(--accent-purple);
        }
        
        /* PDF Attachment */
        .attachment-pdf {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .pdf-icon {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
            padding: 10px;
            border-radius: 8px;
            font-size: 20px;
        }
        .pdf-info h5 {
            font-size: 14px;
            font-weight: 600;
        }
        .pdf-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .download-icon {
            margin-left: auto;
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* Post Actions */
        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        .action-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .action-item i {
            font-size: 18px;
        }

        /* --- Right Sidebar Widgets (Gamification) --- */
        .widgets {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .widget-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .widget-info h4 {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .widget-info .value {
            font-size: 20px;
            font-weight: 800;
            margin: 4px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .widget-info p {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .streak-fire { color: #FF5722; font-size: 18px; }
        .progress-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-purple);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        .hexagon {
            width: 45px;
            height: 50px;
            background-color: var(--success-green);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        /* --- Floating Action Button (FAB) --- */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-purple);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 90;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
        }
        .nav-item i {
            font-size: 22px;
        }
        .nav-item span {
            font-size: 11px;
            font-weight: 600;
        }
        .nav-item.active {
            color: var(--accent-purple);
        }
        .chat-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: var(--accent-purple);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>
