<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX - Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding-bottom: 75px; overflow-x: hidden; }
        
        /* Header Styling */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #ffffff; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid #f1f5f9; }
        .header h1 { font-size: 22px; font-weight: 700; color: #0f172a; text-align: center; flex: 1; }
        .header-actions { display: flex; gap: 18px; align-items: center; }
        .icon-btn { background: none; border: none; cursor: pointer; position: relative; text-decoration: none; color: #0f172a; }
        .badge { position: absolute; top: -6px; right: -6px; background: #4f46e5; color: white; font-size: 10px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #ffffff; }

        /* Stories Styling */
        .main-container { margin-top: 65px; padding: 15px 0; }
        .stories-container { display: flex; gap: 15px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; background: #ffffff; border-bottom: 1px solid #f1f5f9; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-card { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 72px; text-decoration: none; }
        .avatar-ring { width: 70px; height: 70px; border-radius: 50%; padding: 2.5px; display: flex; justify-content: center; align-items: center; position: relative; }
        .avatar-ring.premium { background: linear-gradient(135deg, #8b5cf6, #3b82f6); }
        .avatar-ring.unviewed { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .avatar-ring.mine { background: #e2e8f0; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #ffffff; }
        .plus-icon { position: absolute; bottom: 1px; right: 1px; background: #3b82f6; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; border: 2px solid #ffffff; font-size: 12px; font-weight: bold; }
        .story-name { font-size: 12px; color: #475569; font-weight: 500; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Create Post Box */
        .create-post { background: #ffffff; margin: 12px 16px; padding: 16px; border-radius: 16px; border: 1px solid #f1f5f9; }
        .input-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; text-decoration: none; }
        .user-avatar-small { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .placeholder-text { color: #64748b; font-size: 15px; font-weight: 400; }
        .actions-row { display: flex; justify-content: space-between; border-top: 1px solid #f8fafc; padding-top: 12px; }
        .action-item { display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: #475569; text-decoration: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">

            </a>
            <a href="notifications.html" class="icon-btn">

                    Feeling
                </a>
            </div>
        </div>
