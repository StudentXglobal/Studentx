<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX | Premium Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #0B1121; --bg-card: #151C33; --text-main: #FFFFFF;
            --text-sub: #94A3B8; --accent-purple: #7C3AED;
            --border-color: #263152;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-main); padding-bottom: 100px; }

        /* Header & Nav */
        .header { background: rgba(11, 17, 33, 0.9); backdrop-filter: blur(15px); padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent-purple); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(11, 17, 33, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; padding: 15px 25px; z-index: 1000; }
        .nav-link { text-align: center; color: var(--text-sub); text-decoration: none; font-size: 11px; }
        .nav-link.active { color: var(--accent-purple); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .chat-center { background: var(--accent-purple); padding: 12px; border-radius: 50%; margin-top: -25px; color: white; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }

        /* Posts */
        .post { background: var(--bg-card); margin: 20px; padding: 20px; border-radius: 24px; border: 1px solid var(--border-color); }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .post-media { width: 100%; height: 200px; background: #1e2746; border-radius: 16px; margin: 15px 0; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--accent-purple); }
        .post-footer { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid var(--border-color); color: var(--text-sub); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">StudentX</div>
        <i class="fa-solid fa-bell" style="font-size:20px"></i>
    </header>

    <div id="feed">
        <script>
            const users = [
                {name: "Fatima Muhammad", icon: "fa-file-pdf"},
                {name: "Ahmad Musa", icon: "fa-image"},
                {name: "Zainab Yusuf", icon: "fa-video"},
                {name: "Kabir Ibrahim", icon: "fa-file-pdf"},
                {name: "Maryam Bello", icon: "fa-image"},
                {name: "Usman Danfodio", icon: "fa-video"},
                {name: "Aisha Sani", icon: "fa-file-pdf"},
                {name: "Ibrahim Khalil", icon: "fa-image"},
                {name: "Hafsat Abubakar", icon: "fa-video"},
                {name: "Sadiq Aliyu", icon: "fa-file-pdf"}
            ];

            users.forEach((user, index) => {
                document.write(`
                <article class="post">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
                        <img src="https://i.pravatar.cc/100?u=${index}" class="user-avatar" alt="User">
                        <div>
                            <h4 style="font-size:16px">${user.name}</h4>
                            <p style="font-size:12px; color:var(--text-sub)">Computer Science · ${index+1}h ago</p>
                        </div>
                    </div>
                    <p style="margin-bottom:10px">Yau na koyi wani sabon abu akan Programming, ga abin da na gano!</p>
                    <div class="post-media"><i class="fa-solid ${user.icon}"></i></div>
                    <div class="post-footer">
                        <span><i class="fa-regular fa-heart"></i> ${120 + index}</span>
                        <span><i class="fa-regular fa-comment"></i> ${30 + index}</span>
                        <span><i class="fa-solid fa-share-nodes"></i></span>
                    </div>
                </article>`);
            });
        </script>
    </div>

    <nav class="nav-bar">
        <a href="home.html" class="nav-link active"><i class="fa-solid fa-house"></i> Home</a>
        <a href="explore.html" class="nav-link"><i class="fa-solid fa-compass"></i> Explore</a>
        <a href="chat.html" class="nav-link chat-center"><i class="fa-solid fa-message"></i></a>
        <a href="studyhub.html" class="nav-link"><i class="fa-solid fa-book"></i> Study</a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i> Profile</a>
    </nav>

</body>
</html>
