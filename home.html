<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX - Premium Feed</title>
    <!-- Google Fonts for Premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #7C3AED;
            --bg-color: #F8F9FA;
            --text-main: #1F2937;
            --text-sub: #6B7280;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 90px; }

        /* Header */
        header { background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #E5E7EB; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary-purple); }
        .header-icons i { font-size: 20px; color: var(--text-main); margin-left: 20px; }

        /* Stories */
        .stories-container { display: flex; padding: 15px 20px; gap: 15px; overflow-x: auto; background: var(--white); }
        .story-circle { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--primary-purple); padding: 3px; position: relative; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-name { font-size: 11px; margin-top: 5px; text-align: center; }

        /* Post Creator */
        .create-card { background: var(--white); margin: 20px; padding: 15px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .user-avatar { width: 40px; height: 40px; background: #ddd; border-radius: 50%; }
        .create-card input { width: 100%; border: none; padding: 10px; font-size: 14px; outline: none; }
        .actions-row { display: flex; justify-content: space-around; border-top: 1px solid #F3F4F6; padding-top: 15px; color: var(--text-sub); }

        /* Feed Posts */
        .post { background: var(--white); margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .post-user-info h4 { font-size: 15px; }
        .post-user-info p { font-size: 12px; color: var(--text-sub); }
        .post-content { margin-bottom: 15px; line-height: 1.5; font-size: 14px; }
        .post-media { width: 100%; height: 200px; background: #E5E7EB; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .post-actions { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #F3F4F6; color: var(--text-sub); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; border-top: 1px solid #E5E7EB; z-index: 100; }
        .nav-item { text-align: center; color: var(--text-sub); text-decoration: none; font-size: 20px; }
        .nav-item.active { color: var(--primary-purple); }
    </style>
</head>
<body>

    <header>
        <div class="logo">StudentX</div>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-paper-plane"></i>
        </div>
    </header>

    <div class="stories-container">
        <div class="story-item">
            <div class="story-circle"><img src="https://i.pravatar.cc/100?u=1" alt="Me"></div>
            <div class="story-name">You</div>
        </div>
        <div class="story-item">
            <div class="story-circle"><img src="https://i.pravatar.cc/100?u=2" alt="Fatima"></div>
            <div class="story-name">Fatima</div>
        </div>
        <div class="story-item">
            <div class="story-circle"><img src="https://i.pravatar.cc/100?u=3" alt="John"></div>
            <div class="story-name">John</div>
        </div>
    </div>

    <div class="create-card">
        <div class="input-row">
            <div class="user-avatar"></div>
            <input type="text" placeholder="What's on your mind?">
        </div>
        <div class="actions-row">
            <span><i class="fa-regular fa-image"></i> Photo</span>
            <span><i class="fa-solid fa-poll"></i> Poll</span>
            <span><i class="fa-solid fa-video"></i> Video</span>
        </div>
    </div>

    <!-- Feed Post -->
    <div class="post">
        <div class="post-header">
            <div class="user-avatar" style="background:#8B5CF6"></div>
            <div class="post-user-info">
                <h4>Fatima Muhammad</h4>
                <p>Computer Science • 2h ago</p>
            </div>
        </div>
        <div class="post-content">
            Shared my new notes on Data Structures and Algorithms. Check it out and let me know what you think!
        </div>
        <div class="post-media">
            <span>[PDF/Image Preview]</span>
        </div>
        <div class="post-actions">
            <span><i class="fa-regular fa-heart"></i> 245</span>
            <span><i class="fa-regular fa-comment"></i> 32</span>
            <span><i class="fa-solid fa-retweet"></i> 18</span>
            <span><i class="fa-regular fa-bookmark"></i></span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fa-solid fa-house"></i></a>
        <a href="explore.html" class="nav-item"><i class="fa-solid fa-compass"></i></a>
        <a href="studyhub.html" class="nav-item"><i class="fa-solid fa-book"></i></a>
        <a href="chat.html" class="nav-item"><i class="fa-solid fa-message"></i></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i></a>
    </nav>

</body>
</html>
