<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX — Home Feed</title>
    <!-- Premium Font Family -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F8FAFC;
            color: #0F172A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Phone frame mimicking the exact mobile app view */
        .phone-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(15, 23, 42, 0.08);
        }

        /* --- TOP IOS-STYLE STATUS BAR --- */
        .status-bar {
            padding: 14px 24px 6px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FFFFFF;
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            z-index: 15;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            width: 18px;
            height: 11px;
            fill: currentColor;
        }

        /* --- APP HEADER --- */
        .app-header {
            background-color: #FFFFFF;
            padding: 12px 20px 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Three lines menu layout */
        .menu-triple-line {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 6px;
        }

        .menu-triple-line span {
            display: block;
            width: 22px;
            height: 2.5px;
            background-color: #000000;
            border-radius: 2px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            color: #000000;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            color: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: #6366F1; /* Exact Purple Badge */
            color: #FFFFFF;
            font-size: 9px;
            font-weight: 800;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #FFFFFF;
        }

        /* --- SCROLLABLE CONTAINER --- */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px; /* Space for Nav Bar and Home Indicator */
            background-color: #F8FAFC;
        }

        /* --- STORIES SECTION --- */
        .stories-container {
            background-color: #FFFFFF;
            padding: 16px 0;
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-left: 20px;
            padding-right: 20px;
            scrollbar-width: none;
            border-bottom: 1px solid #F1F5F9;
        }

        .stories-container::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-width: 68px;
            cursor: pointer;
        }

        .story-avatar-wrapper {
            position: relative;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6, #EC4899); /* Premium Ring Color */
            margin-bottom: 6px;
        }

        .story-item.your-profile .story-avatar-wrapper {
            background: none;
            border: 2px dashed #CBD5E1;
            padding: 0;
        }

        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid #FFFFFF;
        }

        .story-item.your-profile .story-img {
            border: none;
        }

        .plus-badge {
            position: absolute;
            bottom: 1px;
            right: 1px;
            background-color: #3B82F6;
            color: #FFFFFF;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            border: 2.5px solid #FFFFFF;
        }

        .story-name {
            font-size: 11px;
            font-weight: 500;
            color: #0F172A;
            max-width: 68px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* --- COMPOSER BOX ("What's on your mind?") --- */
        .composer-card {
            background-color: #FFFFFF;
            margin: 14px 16px;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #E2E8F0;
        }

        .composer-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .composer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .composer-placeholder {
            font-size: 15px;
            color: #64748B;
            font-weight: 400;
        }

        .composer-divider {
            height: 1px;
            background-color: #F1F5F9;
            margin-bottom: 12px;
        }

        .composer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .composer-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #64748B;
            cursor: pointer;
        }

        .action-divider {
            width: 1px;
            height: 16px;
            background-color: #E2E8F0;
        }

        /* --- FEED POSTS --- */
        .post-card {
            background-color: #FFFFFF;
            margin: 0 16px 14px 16px;
            border-radius: 16px;
            padding: 18px;
            border: 1px solid #E2E8F0;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .post-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-meta-name {
            font-size: 14px;
            font-weight: 700;
            color: #0F172A;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .verified-badge {
            color: #3B82F6;
            display: inline-flex;
        }

        .user-meta-sub {
            font-size: 12px;
            color: #64748B;
            margin-top: 1px;
        }

        .post-time {
            font-size: 11px;
            color: #94A3B8;
            margin-top: 2px;
        }

        .post-more-btn {
            background: none;
            border: none;
            color: #64748B;
            cursor: pointer;
            padding: 4px;
            font-size: 14px;
            font-weight: 700;
        }

        .post-body-text {
            font-size: 14px;
            color: #0F172A;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        /* PDF Attachment Box */
        .pdf-attachment-box {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            cursor: pointer;
        }

        .pdf-icon-square {
            width: 42px;
            height: 42px;
            background-color: #EF4444;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 800;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pdf-details {
            flex: 1;
        }

        .pdf-title {
            font-size: 13px;
            font-weight: 600;
            color: #0F172A;
        }

        .pdf-size {
            font-size: 11px;
            color: #64748B;
            margin-top: 2px;
        }

        /* Post Actions Bar */
        .post-interactions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #F1F5F9;
        }

        .interact-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #64748B;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
        }

        .interact-btn.liked {
            color: #EF4444;
        }

        .avatar-social-stack {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
        }

        .stack-images {
            display: flex;
        }

        .stack-img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFFFFF;
            margin-left: -6px;
        }

        .stack-img:first-child {
            margin-left: 0;
        }

        .stack-text {
            font-size: 12px;
            color: #64748B;
            font-weight: 500;
        }

        /* --- PROFILE COMPLETION BANNER --- */
        .completion-banner {
            background-color: #F5F3FF; /* Very Soft Lavender */
            margin: 4px 16px 16px 16px;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            border: 1px solid #DDD6FE;
        }

        .completion-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .trophy-badge {
            width: 44px;
            height: 44px;
            background-color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.05);
        }

        .completion-text-title {
            font-size: 14px;
            font-weight: 700;
            color: #1E1B4B;
        }

        .completion-text-sub {
            font-size: 11px;
            color: #6D28D9;
            margin-top: 2px;
            max-width: 180px;
            line-height: 1.4;
        }

        .completion-action-btn {
            background-color: #4F46E5;
            color: #FFFFFF;
            border: none;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .completion-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            font-size: 12px;
        }

        /* --- FIXED BOTTOM NAVIGATION BAR --- */
        .bottom-nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #FFFFFF;
            border-top: 1px solid #F1F5F9;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 8px 0;
            z-index: 20;
        }

        .nav-tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #94A3B8; /* Clean Slate Gray */
            font-size: 10px;
            font-weight: 600;
            gap: 5px;
            position: relative;
            cursor: pointer;
            width: 64px;
        }

        .nav-tab-item.active {
            color: #4F46E5; /* Premium Indigo Brand */
        }

        .nav-tab-item svg {
            width: 22px;
            height: 22px;
        }

        .nav-badge {
            position: absolute;
            top: -4px;
            right: 14px;
            background-color: #4F46E5;
            color: #FFFFFF;
            font-size: 9px;
            font-weight: 800;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #FFFFFF;
        }

        /* --- IPHONE BOTOM HOME INDICATOR BAR --- */
        .iphone-home-indicator-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 25;
            padding-bottom: 8px;
        }

        .home-indicator-line {
            width: 134px;
            height: 4.5px;
            background-color: #000000;
            border-radius: 10px;
        }
    </style>
</head>
