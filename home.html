<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>StudentX - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Poppins,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;padding-bottom:60px}
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(10,10,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-menu{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:18px}
.hdr-logo{font-size:18px;font-weight:900;letter-spacing:-.5px}
.hdr-logo b{font-weight:900;background:linear-gradient(135deg,#7c3aed,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;gap:4px}
.hdr-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:16px;position:relative}
.hdr-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:#ef4444;border:2px solid #0a0a0f}
.stories{display:flex;gap:14px;overflow-x:auto;padding:14px 14px 10px;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.st{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.st-ring{width:58px;height:58px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#7c3aed,#a855f7,#06b6d4)}
.st-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2.5px solid #0a0a0f}
.st-add{width:58px;height:58px;border-radius:50%;border:2px dashed rgba(124,58,237,.5);display:flex;align-items:center;justify-content:center;font-size:20px;color:#a855f7;background:rgba(124,58,237,.08)}
.st-nm{font-size:10px;color:rgba(255,255,255,.4);max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpb{display:flex;align-items:center;gap:10px;padding:12px;margin:0 14px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;cursor:pointer;transition:border-color .2s}
.cpb:hover{border-color:rgba(124,58,237,.3)}
.cpb img{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer}
.cpb-in{flex:1;padding:8px 12px;border-radius:20px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);font-size:12px}
.cpb-tools{display:flex;gap:10px}
.cpb-t{color:rgba(255,255,255,.35);font-size:16px}
.cpb-t.g{color:#10b981}.cpb-t.r{color:#ef4444}.cpb-t.y{color:#f59e0b}
.comp{display:flex;align-items:center;gap:10px;padding:12px 14px;margin:0 14px 12px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.15);border-radius:12px;cursor:pointer;transition:background .2s}
.comp:hover{background:rgba(124,58,237,.12)}
.comp i{color:#a855f7;font-size:18px}
.comp p{flex:1;font-size:12px;font-weight:600}
.comp .ar{color:#a855f7;font-size:12px}
.post{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;margin:0 14px 12px;overflow:hidden}
.p-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px}
.p-av{width:38px;height:38px;border-radius:50%;object-fit:cover;cursor:pointer}
.p-info{flex:1;min-width:0}
.p-nm{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px}
.p-nm .vd{color:#a855f7;font-size:10px}
.p-meta{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.p-more{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:14px}
.p-body{padding:0 14px 8px;font-size:13px;line-height:1.6;color:rgba(255,255,255,.7)}
.p-file{margin:0 14px 10px;padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s}
.p-file:hover{border-color:rgba(124,58,237,.3)}
.p-file-ic{width:40px;height:40px;border-radius:10px;background:rgba(239,68,68,.1);display:flex;align-items:center;justify-content:center;color:#ef4444;font-size:18px}
.p-file-inf{flex:1;min-width:0}
.p-file-nm{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-file-sz{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
.p-file-dl{color:#a855f7;font-size:13px}
.p-acts{display:flex;align-items:center;padding:4px 8px 10px;gap:2px}
.p-a{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:20px;font-size:11px;color:rgba(255,255,255,.4);font-weight:600;transition:all .15s}
.p-a:hover{background:rgba(124,58,237,.1);color:#a855f7}
.p-a.lk{color:rgba(255,255,255,.4)}.p-a.lk.on{color:#ef4444}
.p-a.lk.on i{animation:lp .3s ease}
@keyframes lp{50%{transform:scale(1.3)}}
.p-a-r{margin-left:auto}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:60px;display:flex;align-items:center;justify-content:space-around;background:rgba(10,10,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06);z-index:200}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;color:rgba(255,255,255,.3);transition:color .2s}
.nb i{font-size:19px}
.nb.on{color:#a855f7}
.mnu-ov{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center}
.mnu-ov.show{display:flex}
.mnu-sh{position:fixed;inset:0;background:rgba(0,0,0,.5)}
.mnu-glass{position:relative;z-index:1;width:100%;max-width:430px;background:rgba(20,20,45,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:20px 20px 0 0;padding:12px 0 24px;animation:mnuUp .25s ease}
@keyframes mnuUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mnu-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:4px;margin:0 auto 12px}
.mnu-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);transition:all .15s}
.mnu-item:hover{background:rgba(124,58,237,.1);color:#fff}
.mnu-item i{width:18px;text-align:center;font-size:14px;color:rgba(255,255,255,.4)}
.mnu-item.dng{color:#ef4444}.mnu-item.dng i{color:#ef4444}
.mnu-div{height:1px;background:rgba(255,255,255,.06);margin:6px 20px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:11px 20px;background:rgba(124,58,237,.92);backdrop-filter:blur(12px);color:#fff;border-radius:12px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<header class="hdr">
<div class="hdr-l">
<div class="hdr-menu" onclick="window.location.href='menu.html'"><i class="fas fa-bars"></i></div>
<div class="hdr-logo">Student<b>X</b></div>
</div>
<div class="hdr-r">
<div class="hdr-btn" onclick="window.location.href='search.html'"><i class="fas fa-search"></i></div>
<div class="hdr-btn" onclick="window.location.href='notification.html'"><i class="fas fa-bell"></i><span class="hdr-dot"></span></div>
</div>
</header>

  <div class="story-circle" onclick="window.location.href='story.html'" style="cursor: pointer;">
     <img src="${user.av}" />

<div class="cpb" onclick="window.location.href='create-post.html'">
<img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" onclick="event.stopPropagation();window.location.href='profile.html'" alt="">
<div class="cpb-in">What's on your mind?</div>
<div class="cpb-tools">
<div class="cpb-t g"><i class="fas fa-image"></i></div>
<div class="cpb-t r"><i class="fas fa-video"></i></div>
<div class="cpb-t y"><i class="fas fa-poll"></i></div>
</div>
</div>

<div class="comp" onclick="window.location.href='profile.html'">
<i class="fas fa-user-plus"></i>
<p>Complete your profile</p>
<i class="fas fa-chevron-right ar"></i>
</div>

<div id="feed"></div>

<nav class="bnav">
<div class="nb on" onclick="window.location.href='home.html'"><i class="fas fa-home"></i><span>Home</span></div>
<div class="nb" onclick="window.location.href='explore.html'"><i class="fas fa-compass"></i><span>Explore</span></div>
<div class="nb" onclick="window.location.href='chat.html'"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
<div class="nb" onclick="window.location.href='studyhub.html'"><i class="fas fa-book-open"></i><span>StudyHub</span></div>
<div class="nb" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
</nav>

<div class="mnu-ov" id="menuOv">
<div class="mnu-sh" onclick="closeMenu()"></div>
<div class="mnu-glass" id="menuGlass">
<div class="mnu-handle"></div>
<div id="menuItems"></div>
</div>
</div>
<script>
var myId = 1;

var users = [
  {id:1,name:'John Doe',school:'ABU Zaria',avatar:'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop',verified:false},
  {id:2,name:'Fatima Muhammad',school:'UNILAG',avatar:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop',verified:true},
  {id:3,name:'David Okafor',school:'FUT Minna',avatar:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop',verified:false},
  {id:4,name:'Aisha Bello',school:'Bayero Univ',avatar:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop',verified:true},
  {id:5,name:'Emeka Nwankwo',school:'UNN',avatar:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop',verified:false},
  {id:6,name:'Halima Yusuf',school:'UDUS',avatar:'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop',verified:false}
];

var posts = [
  {id:1,user:2,text:'',file:{name:'Data Structures & Algorithms.pdf',size:'4.2 MB'},likes:245,comments:32,shares:18,liked:false,saved:false,time:Date.now()-3600000},
  {id:2,user:3,text:'Can someone explain the second law of thermodynamics in simple terms? I have an exam next week and I am struggling with the concept.',file:null,likes:56,comments:23,shares:5,liked:false,saved:false,time:Date.now()-7200000},
  {id:3,user:6,text:'Just finished my documentary on campus life! Check it out when you get a chance.',file:null,image:'https://images.unsplash.com/photo-1523050854058-8df90110c476?w=600&h=400&fit=crop',likes:189,comments:41,shares:27,liked:false,saved:false,time:Date.now()-14400000},
  {id:4,user:4,text:'Pro tip for med students: Use spaced repetition for anatomy. It changed my study game completely.',file:null,likes:412,comments:67,shares:89,liked:false,saved:false,time:Date.now()-28800000}
];

function timeAgo(t){
  var s=Math.floor((Date.now()-t)/1000);
  if(s<60)return'Just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function getU(id){return users.find(function(u){return u.id===id})}

function renderStories(){
  var h='<div class="st" onclick="window.location.href=\'story-upload.html\'"><div class="st-add"><i class="fas fa-plus"></i></div><div class="st-nm">Your Story</div></div>';
  users.slice(1,6).forEach(function(u){
    h+='<div class="st" onclick="window.location.href=\'story-upload.html\'"><div class="st-ring"><img src="'+u.avatar+'" alt=""></div><div class="st-nm">'+u.name.split(' ')[0]+'</div></div>';
  });
  document.getElementById('stories').innerHTML=h;
}

function renderFeed(){
  var c=document.getElementById('feed');
  c.innerHTML=posts.map(function(p){
    var u=getU(p.user);
    var fileH='';
    if(p.file){
      fileH='<div class="p-file" onclick="showMsg(\'Downloading '+p.file.name+'\')"><div class="p-file-ic"><i class="fas fa-file-pdf"></i></div><div class="p-file-inf"><div class="p-file-nm">'+p.file.name+'</div><div class="p-file-sz">'+p.file.size+'</div></div><div class="p-file-dl"><i class="fas fa-download"></i></div></div>';
    }
    var imgH='';
    if(p.image){
      imgH='<img src="'+p.image+'" style="width:100%;aspect-ratio:3/2;object-fit:cover" alt="">';
    }
    return'<div class="post"><div class="p-hdr"><img class="p-av" src="'+u.avatar+'" onclick="window.location.href=\'profile.html\'" alt=""><div class="p-info"><div class="p-nm">'+u.name+(u.verified?' <i class="fas fa-check-circle vd"></i>':'')+'</div><div class="p-meta">'+u.school+' · '+timeAgo(p.time)+'</div></div><div class="p-more" onclick="openMenu('+p.id+','+p.user+')"><i class="fas fa-ellipsis-h"></i></div></div>'+(p.text?'<div class="p-body">'+p.text+'</div>':'')+fileH+imgH+'<div class="p-acts"><div class="p-a lk '+(p.liked?'on':'')+'" onclick="toggleLike('+p.id+')"><i class="'+(p.liked?'fas':'far')+' fa-heart"></i> '+p.likes+'</div><div class="p-a" onclick="window.location.href=\'comment.html?post='+p.id+'\'"><i class="far fa-comment"></i> '+p.comments+'</div><div class="p-a" onclick="repost('+p.id+')"><i class="fas fa-retweet"></i> '+p.shares+'</div><div class="p-a p-a-r" onclick="toggleSave('+p.id+')"><i class="'+(p.saved?'fas':'far')+' fa-bookmark" style="color:'+(p.saved?'#f59e0b':'')+'"></i></div></div></div>';
  }).join('');
}

function toggleLike(id){
  var p=posts.find(function(x){return x.id===id});
  if(p){p.liked=!p.liked;p.likes+=p.liked?1:-1;renderFeed()}
}

function toggleSave(id){
  var p=posts.find(function(x){return x.id===id});
  if(p){p.saved=!p.saved;renderFeed();showMsg(p.saved?'Post saved':'Post removed from saved')}
}

function repost(id){
  var p=posts.find(function(x){return x.id===id});
  if(p){p.shares+=1;renderFeed();showMsg('Reposted!')}
}

function openMenu(postId,userId){
  var isMine=userId===myId;
  var h='';
  if(isMine){
    h+='<div class="mnu-item" onclick="showMsg(\'Edit post\');closeMenu()"><i class="fas fa-pen"></i> Edit Post</div>';
    h+='<div class="mnu-item" onclick="showMsg(\'Post pinned\');closeMenu()"><i class="fas fa-thumbtack"></i> Pin Post</div>';
    h+='<div class="mnu-item dng" onclick="deletePost('+postId+');closeMenu()"><i class="fas fa-trash"></i> Delete Post</div>';
    h+='<div class="mnu-div"></div>';
  }
  h+='<div class="mnu-item" onclick="showMsg(\'Post saved\');closeMenu()"><i class="far fa-bookmark"></i> Save Post</div>';
  h+='<div class="mnu-item" onclick="showMsg(\'Share coming soon\');closeMenu()"><i class="fas fa-share"></i> Share Post</div>';
  h+='<div class="mnu-item" onclick="copyLink();closeMenu()"><i class="fas fa-link"></i> Copy Link</div>';
  h+='<div class="mnu-div"></div>';
  h+='<div class="mnu-item" onclick="window.location.href=\'profile.html\'"><i class="fas fa-user"></i> View Profile</div>';
  h+='<div class="mnu-item" onclick="showMsg(\'Followed!\');closeMenu()"><i class="fas fa-user-plus"></i> Follow User</div>';
  h+='<div class="mnu-item" onclick="showMsg(\'User muted\');closeMenu()"><i class="fas fa-volume-mute"></i> Mute User</div>';
  h+='<div class="mnu-item" onclick="hidePost('+postId+');closeMenu()"><i class="fas fa-eye-slash"></i> Hide Post</div>';
  h+='<div class="mnu-item dng" onclick="showMsg(\'Post reported\');closeMenu()"><i class="fas fa-flag"></i> Report Post</div>';
  document.getElementById('menuItems').innerHTML=h;
  document.getElementById('menuOv').classList.add('show');
}

function closeMenu(){document.getElementById('menuOv').classList.remove('show')}

function deletePost(id){
  posts=posts.filter(function(x){return x.id!==id});
  renderFeed();
  showMsg('Post deleted');
}

function hidePost(id){
  deletePost(id);
  showMsg('Post hidden');
}

function copyLink(){
  var url=window.location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url)}
  showMsg('Link copied!');
}

function showMsg(t){
  var d=document.createElement('div');
  d.className='toast';
  d.textContent=t;
  document.body.appendChild(d);
  setTimeout(function(){d.remove()},2500);
}

renderStories();
renderFeed();

</script>
  <script>
    // Wannan zai saurari dukkan clicks a shafin
    document.addEventListener('click', function(event) {
        // Idan abin da aka danna (ko uban sa) yana da class ɗin 'story-circle'
        const circle = event.target.closest('.story-circle');
        
        if (circle) {
            // Idan an same shi, kai direct zuwa story.html
            window.location.href = 'story.html';
        }
    });
    <!-- Misalin yadda story circle ɗinka ya kamata ya kalli a HTML -->
<div class="story-circle" data-story="true">
    <img src="fatima.jpg" alt="Fatima">
</div>
  <script>
    document.addEventListener('click', function(event) {
        // Mun nemo ko abin da aka danna, ko uban sa, yana da alamar 'data-story'
        const storyElement = event.target.closest('[data-story="true"]');
        
        if (storyElement) {
            // Mun hana wasu scripts su ci gaba da gudana domin su karye wannan
            event.preventDefault();
            event.stopPropagation();
            
            // Sai ka kai direct zuwa story.html
            window.location.href = 'story.html';
            return false;
        }
    }, true); // Mun saka 'true' domin ya kama click ɗin kafin duk wani code
</script>  
  </script>
</body>
</html>
