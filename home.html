<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentX Dark Mode</title>
    <!-- Muna amfani da FontAwesome don Icons su fito fes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0B1121; /* Blue mai duhu */
            color: #FFFFFF; /* Fari */
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Gyara Icons su zama fari ko launin da zasu fito */
        .icon {
            color: #FFFFFF;
            font-size: 24px;
        }

        /* Tsarin Post */
        .post-container {
            background-color: #151C33; /* Kalar card mai duhu */
            padding: 20px;
            margin: 15px;
            border-radius: 15px;
            border: 1px solid #263152;
        }

        .post-text {
            color: #E2E8F0;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        /* Gyaran Icons na kasa (Like, Comment, Share) */
        .actions {
            display: flex;
            justify-content: space-between;
            color: #94A3B8; /* Launin toka mai haske */
            padding-top: 10px;
            border-top: 1px solid #263152;
        }

        .action-btn {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Misalin yadda post din zai fito -->
    <div class="post-container">
        <h3>Maryam Hassan</h3>
        <p class="post-text">Just finished my notes on Linked Lists! Hope this helps someone. 💜</p>
        
        <div class="actions">
            <span class="action-btn"><i class="fa-regular fa-thumbs-up"></i> 142</span>
            <span class="action-btn"><i class="fa-regular fa-comment"></i> 26</span>
            <span class="action-btn"><i class="fa-solid fa-share"></i> 18</span>
        </div>
    </div>

</body>
</html>
