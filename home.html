<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudentX — Home</title>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F8FAFC;
            color: #0F172A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Framework Container */
        .phone-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #F8FAFC;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.03);
        }

        /* --- TOP HEADER NAVIGATION --- */
        .app-header {
            background-color: #FFFFFF;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #F1F5F9;
        }

        .menu-triple-line {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            text-decoration: none;
            padding: 4px;
        }

        .menu-triple-line span {
            display: block;
            width: 22px;
            height: 2.5px;
            background-color: #0F172A;
            border-radius: 2px;
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            color: #0F172A;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            color: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #6366F1;
            color: #FFFFFF;
            font-size: 10px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #FFFFFF;
        }

        /* --- SCROLLABLE CONTAINER --- */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 90px;
        }

        /* --- HORIZONTAL STORIES LINKS --- */
        .stories-container {
            background-color: #FFFFFF;
            padding: 16px 0;
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-left: 20px;
            padding-right: 20px;
            scrollbar-width: none;
            border-bottom: 1px solid #F1F5F9;
        }

        .stories-container::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-width: 68px;
            text-decoration: none;
            cursor: pointer;
        }

        .story-avatar-wrapper {
            position: relative;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            padding: 2.5px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6, #EC4899);
            margin-bottom: 6px;
        }

        .story-item.your-profile .story-avatar-wrapper {
            background: none;
            border: 2px dashed #CBD5E1;
            padding: 0;
        }

        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFFFFF;
        }

        .plus-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: #3B82F6;
            color: #FFFFFF;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            border: 2px solid #FFFFFF;
        }

        .story-name {
            font-size: 11px;
            font-weight: 500;
            color: #64748B;
        }

        /* --- COMPOSER BOX --- */
        .composer-card {
            background-color: #FFFFFF;
            margin: 12px 16px;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #E2E8F0;
        }

        .composer-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .composer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .composer-placeholder {
            font-size: 14px;
            color: #64748B;
            font-weight: 400;
        }

        .composer-divider {
            height: 1px;
            background-color: #F1F5F9;
            margin-bottom: 12px;
        }

        .composer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .composer-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #64748B;
            cursor: pointer;
        }

        /* --- POST COMPONENT --- */
        .post-card {
            background-color: #FFFFFF;
            margin: 0 16px 12px 16px;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #E2E8F0;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .post-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-meta-name {
            font-size: 14px;
            font-weight: 700;
            color: #0F172A;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .verified-badge {
            color: #3B82F6;
            display: inline-flex;
        }

        .user-meta-sub {
            font-size: 12px;
            color: #64748B;
            margin-top: 1px;
        }

        .post-time {
            font-size: 11px;
            color: #94A3B8;
            margin-top: 2px;
        }

        .post-more-btn {
            color: #64748B;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 16px;
            padding: 2px 6px;
        }

        .post-body-text {
            font-size: 14px;
            color: #1E293B;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        /* PDF Attachment Display */
        .pdf-attachment-box {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .pdf-icon-square {
            width: 40px;
            height: 40px;
            background-color: #EF4444;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 800;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pdf-details {
            flex: 1;
        }

        .pdf-title {
            font-size: 13px;
            font-weight: 600;
            color: #1E293B;
        }

        .pdf-size {
            font-size: 11px;
            color: #64748B;
            margin-top: 2px;
        }

        /* Action Buttons Row */
        .post-interactions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #F1F5F9;
            margin-bottom: 8px;
        }

        .interact-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #64748B;
            cursor: pointer;
            padding: 6px 8px;
            text-decoration: none;
        }

        .interact-btn.liked {
            color: #EF4444;
        }

        .interact-btn.bookmarked {
            color: #F59E0B; /* Gold/Orange bookmark active look */
        }

        .avatar-social-stack {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .stack-images {
            display: flex;
        }

        .stack-img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #FFFFFF;
            margin-left: -6px;
        }

        .stack-img:first-child {
            margin-left: 0;
        }

        .stack-text {
            font-size: 12px;
            color: #64748B;
        }

        /* --- PROMPT COMPLETION CARD --- */
        .completion-banner {
            background-color: #F1F5F9;
            margin: 8px 16px 16px 16px;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .completion-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .trophy-badge {
            width: 44px;
            height: 44px;
            background-color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .completion-text-title {
            font-size: 14px;
            font-weight: 700;
            color: #0F172A;
        }

        .completion-text-sub {
            font-size: 12px;
            color: #64748B;
            margin-top: 2px;
        }

        .completion-action-btn {
            background-color: #4F46E5;
            color: #FFFFFF;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
        }

        .completion-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
        }

        /* --- SECURE RELIABLE BOTTOM NAVIGATION BAR --- */
        .bottom-nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #FFFFFF;
            border-top: 1px solid #F1F5F9;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px 0;
            z-index: 10;
        }

        .nav-tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #94A3B8;
            font-size: 10px;
            font-weight: 600;
            gap: 4px;
            position: relative;
            width: 64px;
        }

        .nav-tab-item.active {
            color: #4F46E5;
        }

        .nav-badge {
            position: absolute;
            top: -4px;
            right: 14px;
            background-color: #4F46E5;
            color: #FFFFFF;
            font-size: 9px;
            font-weight: 700;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <!-- App Header Bar Setup -->
        <header class="app-header">
            <a href="menuicon.html" class="menu-triple-line">
                <span></span>
                <span></span>
                <span></span>
            </a>
            <h1 class="header-title">Home</h1>

        <!-- Main Content (Scrolling Feed) -->
        <div class="scrollable-content">

                <a href="story.html" class="story-item">

                    </div>
                    <span class="story-name">Maryam</span>
                </a>
                <a href="story.html" class="story-item">

                    </div>
                    <span class="story-name">David</span>
                </a>
            </div>

            <!-- Composer Card -->
            <div class="composer-card">
                <div class="composer-top">
                    <img class="composer-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200" alt="Me">
